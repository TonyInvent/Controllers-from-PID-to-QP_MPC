# 为什么音响功放设计与控制理论说着不同的语言

**控制理论家看着一台高端音响功放，看到的是一个反馈控制系统。音响设计师看着同一张电路图，看到的是一个带负反馈的放大器。它们是完全相同的东西。那为什么教科书、测量方法和设计优先级如此不同？**

---

## 1. 同一个环路，两个部落

一台音响功放就是一台反馈控制系统。句号。

- **"被控对象"** 是输出级——一对功率晶体管驱动着扬声器负载。
- **"控制器"** 是输入级加电压放大级加频率补偿网络。
- **"反馈网络"** 是从输出到输入的分压电阻。
- **"设定值"** 是音乐信号。
- **"扰动"** 是电源纹波、负载变化、热漂移、以及输出晶体管本身的非线性。
- **"误差信号"** 是输入与衰减后输出之差——这恰恰是差分对产生的信号。

每一个概念都能对应上。稳定裕度。环路增益。扰动抑制。带宽。压摆率。输出阻抗。它们是相同的数学，应用于相同的物理。

然而。走进一场音响工程会议和一场控制会议，你会听到两种完全不同的语言。音响工程师在讨论 THD、TIM、"声音特质"，以及 40 dB 的反馈是否"太多"。控制工程师在讨论相位裕度、灵敏度函数，以及环路对对象不确定性是否足够鲁棒。他们可能在描述同一台功放，但谁也不会认出对方的描述。

为什么？

---

## 2. 历史的分叉

两个领域在 1940 年左右分道扬镳，再也没有合流。

### 控制分支

控制理论源于工业需求——蒸汽机、化工厂、自动驾驶仪、伺服机构。主导的知识力量是应用数学。核心问题是稳定性和鲁棒性，因为炼油厂爆炸很贵，飞机坠毁是所有人的噩梦。这个文化崇尚证明、保证和普适性。

到了 1960 年代，控制理论已经有了状态空间方法、李亚普诺夫稳定性和最优控制的雏形。数学上令人望而生畏。但他们搞的问题——导弹制导、化工过程控制、卫星姿态——与音响毫无关系。

### 音响分支

音响源于电信和消费电子。主导的知识力量是电路设计。核心问题是噪声、失真、带宽，以及——至关重要的——东西*听起来*如何。这个文化崇尚测量（THD、SNR），以及颇有争议的主观听感评价。没有证明。只有传闻。

Harold Black 于 1927 年在贝尔实验室发明了负反馈放大器。他思考的方式像一个控制理论家——用反馈来线性化非线性放大器，降低失真。但 1950–70 年代商业化音响的人，是电路设计师，不是控制理论家。他们的思维模型是电子管、然后是晶体管、然后是运放。他们对反馈的认知模型是："把输出的一部分反相送回输入。失真按环路增益降低。小心别振荡。"

这个认知模型**是对的**——它只是控制理论对反馈所能揭示的一小部分。在很多年里，这已经够了。

### 是什么巩固了分裂

两件事。第一，晶体管时代（1960 年代）使电路复杂到直觉破灭的程度。第二，1970 年代的"反馈战争"创造了一套并行神话，至今没有被拆穿。

反馈战争由芬兰工程师 Matti Otala 发起。他观察到某些高全局负反馈的晶体管放大器在主观听感上不如那些反馈更少的简单设计。他提出了一个机制——瞬态互调失真（TIM）——并论证高反馈是罪魁祸首。音响媒体一拥而上。"反馈是坏的"成了普遍信条。低反馈、甚至零反馈设计成了商业卖点。

从一个控制理论家的视角来看，悲剧在于 Otala 识别出了一个真实的现象——前向通路带宽不足导致的压摆率限制，结合大反馈系数，产生了静态 THD 测量捕捉不到的非线性失真。但诊断错了。问题不是*反馈*。问题是反馈应用在了一个开环带宽太低、压摆率不足、相位裕度可疑的放大器上。解药不是*减少*反馈。解药是更好的环路设计——更宽的带宽、更高的压摆率、恰当的补偿。

控制理论界在 1975 年就讲得清。分析的数学工具——环路中非线性元件的描述函数、鲁棒裕度、灵敏度函数——全都存在。但音响界没有人在读控制文献。控制界也没有人在想音响功放。

于是两个部落继续并行，各自发展各自的词汇、各自的设计规则、各自的神话，用完全不同的术语讨论同一个反馈环路。

---

## 3. 测量的鸿沟

语言分歧的最大推手，是**每个领域认为什么值得测量**。

### 音响测量什么

| 测量项目 | 捕捉了什么 | 对音响人的意义 |
|---------|----------|-------------|
| **THD+N**（总谐波失真+噪声） | 非线性：1 kHz 输入，测量 2 kHz、3 kHz……以及底噪 | "这台功放有多干净？" |
| **IMD**（互调失真） | 19 kHz + 20 kHz 输入，看 1 kHz 差频 | "复杂音乐信号下表现如何？" |
| **SINAD**（信纳比） | 单一性能指标 | "哪台功放更好？" |
| **阻尼系数** | $Z_\text{load} / Z_\text{out}$（低频） | "能控制住低音单元吗？" |
| **压摆率** | 输出最大 dV/dt | "能不失真地跟踪快速瞬态吗？" |
| **频率响应** | 20 Hz – 20 kHz，±0.1 dB | "音调中性吗？" |

音响人在测量输出端的*误差*，在会让控制工程师笑出声的水平上：−120 dB 算"可以"，−130 dB 算"高端"。他们测量非线性效应——谐波——而控制理论基本忽略，因为它假设线性。

### 控制测量什么

| 测量项目 | 捕捉了什么 | 对控制人的意义 |
|---------|----------|-------------|
| **相位裕度 / 增益裕度** | 环路离不稳定有多近 | "这东西会振荡吗？" |
| **灵敏度函数** $S(s)$ | 扰动抑制 vs 频率 | "负载变化能多好地抑制？" |
| **互补灵敏度** $T(s)$ | 跟踪和噪声放大 | "能跟随参考吗？放大传感器噪声吗？" |
| **带宽 / 穿越频率** | 环路增益穿越 0 dB 的位置 | "响应能有多快？" |
| **阶跃响应**（超调、调节时间） | 瞬态行为 | "受到扰动会振铃吗？" |
| **鲁棒裕度** | 对象不确定下的稳定性 | "负载变了还能行吗？" |

注意这种不对称。音响测量的是稳态正弦波下盒子的输出——最多是双音测试。控制测量的是*稳定性边界*和*瞬态*行为。两个社群通过完全不同的透镜看同一个环路。

而这就是关键：**两组测量都来自同一个环路数学。** 灵敏度函数 $S(s)$ 同时决定了 THD 降低（音响关心）和扰动抑制（控制关心）。互补灵敏度 $T(s)$ 同时决定了频率响应上的峰（音响的 ±0.1 dB 执念）和超调（控制的调节时间）。环路增益同时决定了阻尼系数（音响）和输出端的扰动抑制（控制）。它们是相同的量，不同的名字。

---

## 4. 术语对照表

如果你懂控制理论，需要读懂一篇音响功放论文，这是你的词典：

| 控制理论术语 | 音响对应 | 备注 |
|------------|--------|------|
| 对象 $G(s)$ | 开环放大器（前向通路） | 反馈前的增益级 |
| 控制器 $K(s)$ | 频率补偿网络 | 通常只是一个电容——某频率处的一个极点 |
| 反馈 $H(s)$ | 反馈网络 | 电阻分压，几乎总是平的 |
| 环路增益 $L(s) = GKH$ | 环路增益 | 相同概念，相同的 Bode 图 |
| 灵敏度 $S = 1/(1+L)$ | 失真降低因子 | $L \gg 1$ 时 $S \approx 1/L$——这就是"更多反馈 = 更低 THD"的原因 |
| 互补灵敏度 $T = L/(1+L)$ | 闭环增益 | 音响人管这叫"增益"，基本忽略它的动态 |
| 相位裕度 | 稳定裕度 | 音响："方波响应振铃吗？" |
| 增益裕度 | 振荡前的余量 | 音响："要振荡了加个 Zobel 网络" |
| 穿越频率 $\omega_c$ | 单位增益频率、增益带宽积 | 开环增益碰到闭环增益的位置 |
| 扰动抑制 | PSRR、CMRR、负载调整率 | 电源抑制、共模抑制、输出阻抗 |
| 参考跟踪 | 频率响应平坦度 | "±0.1 dB, 20 Hz – 20 kHz" |
| 压摆率限制 | 压摆率限制 | 这个他们居然共享了——也是 TIM 的来源 |
| 非线性对象 | 交越失真、晶体管非线性 | 音响极度关心；控制通常假设线性 |
| 噪声整形（ΔΣ） | D 类调制器中的噪声整形 | 唯一一个音响人自己*发明了*他们不知道的控制理论的地方 |

对照表说明了一切：音响没有任何东西在控制理论之外。映射是完整的。区别纯粹在于强调和测量文化。

---

## 5. 具体哪些地方强调不同，以及为什么会这样

### 5.1 −120 dB 的失真

控制理论问："输出在设定值的 1% 以内吗？" 音响问："输出中是否存在输入中没有的分量，水平低于百万分之一？"

音响功放的"对象"（输出级）是严重非线性的——没有反馈时，B 类交越失真在百分之几的水平上产生谐波。反馈按环路增益将其压低。在 1 kHz，环路增益可能有 60 dB，将 1% 的开环失真降低到闭环的 0.001%。非常优秀。

但音响工程师想知道：在 6 kHz 呢？那里环路增益只有 24 dB。1% 的开环失真变成 0.06% 闭环。这可闻。而 3 kHz 的第 7 次谐波（21 kHz）呢？那里环路增益可能只有 10 dB，放大器几乎完全不再线性化。

控制理论的线性近似对这些效应是盲的。音响功放必须面对一个非线性对象，其非线性是*你正在努力压制的主要对象*，而且在环路已经变弱了的频率上。

这驱使音响设计师疯狂执着于开环线性度（A 类偏置、误差校正、前馈）——不是因为反馈"不灵"，而是因为反馈的效果随频率下降，而音响要求全频带的线性度。

### 5.2 负载是移动靶

在大多数控制系统中，对象是明确表征的。你知道你的电机、你的化学反应器、你的飞行器动力学。

在音响中，负载是扬声器。客户随意选的一只扬声器。其阻抗随频率从 2 Ω 变到 40 Ω，带有容性和感性相位角度。功放必须在*任何*负载下保持稳定。而反馈网络——$H(s)$ 分支，简单的电阻分压——是放大器与其所处环境之间的唯一界面。

这是一个**鲁棒控制问题**。功放必须对极大不确定集内的*所有*负载保持稳定。控制理论界为此开发了专门工具（H∞、μ 综合、小增益定理），但音响设计师用经验法则来解决："在输出端串个电感"、"输出端加 Zobel 网络"、"环路增益穿越 0 dB 不要太陡"。

控制理论家会说：你在为一个对象不确定集做设计。用 $S(s)$ 来界定影响。音响设计师会说：加个 Thiele 网络。他们在解决同一个问题。

### 5.3 D 类的到来

D 类（开关）功放是音响与控制理论之间最戏剧性的碰撞。一台 D 类功放是：
- 一个开关变换器（像 BUCK 稳压器）
- 包在一个反馈环路里
- 驱动一个 LC 输出滤波器
- 带有一个非线性调制器（比较器 + 三角波 = PWM）

这是一个环路内部含有非线性元件的控制系统。LC 滤波器在谐振处引入 180° 相位偏移——你需要相位超前补偿，否则环路会振荡。调制器引入延迟（开关周期）。电源引入扰动（纹波注入输出）。而整个东西的带宽必须延伸到 40 kHz 以上，才称得上真正高性能的音响。

控制理论对此有专门的术语：这是一个电压模式控制的开关电源，带有输出滤波器。电源工程师用 Bode 图和补偿器设计来分析它。音响工程师管它叫"滤波器后反馈 D 类"，分析手段是……嗯，很多人就是试值，直到能工作。

最好的 D 类设计师——Hypex、Purifi、TI、Infineon 的那些——明确地使用控制理论。他们把 PWM 调制器建模为带延迟的增益模块。把 LC 滤波器建模为二阶对象。用标准的环路整形技术设计补偿器。结果是一台 SNR 120 dB、THD 0.0001%、全负载范围内稳定的功放。这是控制理论应用于音响的胜利——但市场部管这叫"专利反馈拓扑"，不叫"鲁棒环路整形控制"。

---

## 6. 音响可以从控制理论学到什么

音响界 50 年来一直在靠试错重新发明控制理论。以下是控制界几十年前就搞明白了，能立刻改进任何音响功放设计的东西：

### 6.1 别再怕高反馈了。要怕的是糟糕的环路设计。

这是我死磕到底的一个山丘。

"反馈是坏的"这个发烧友运动，基于一个范畴错误。他们观察到某些高反馈功放听起来差。他们把差归因于反馈。他们应该把它归因于*环路设计*。一台具有 80 dB 环路增益、200 kHz 单位增益带宽、恰当补偿到 60° 相位裕度的功放，声音会干净、快速、无色。一台 40 dB 环路增益、相位裕度糟糕、压摆率不足的功放，声音会"颗粒感"或"塞"。差别的关键不是反馈的*量*，而是反馈环路的*品质*。

控制理论教我们的是：反馈是一件工具。用好了，它线性化、抑制扰动、降低输出阻抗。用砸了，它振荡或振铃。反馈的*量*是由你在对象和补偿器引入的相位滞后迫使你穿越 0 dB 之前能实现的环路增益决定的。这是 Bode 积分定理，不是品味问题。

### 6.2 测量环路，而不只是输出

音响评测痴迷于 8 Ω 阻性负载下的 THD+N 图。这是在*最容易的条件下*测量*闭环输出*。它几乎什么都告诉不了你——关于稳定裕度、负载敏感性或瞬态行为。

控制理论家会反过来要求看：
- 开环增益 Bode 图
- 相位裕度和增益裕度
- 容性负载下的阶跃响应
- 输出阻抗 vs 频率

这四个测量告诉你关于这台功放*作为反馈系统实际表现*的一切。THD 数字是环路设计的结果——它应该被推导出来，而不是当主角。

### 6.3 灵敏度函数是你的朋友

当音响设计师"加更多反馈"时，他们在塑造灵敏度函数 $S(s)$。在环路带宽之内，$|S| \ll 1$——失真和电源噪声被抑制。在环路带宽及以上，$|S| \to 1$——没有任何被抑制，事实上可能还有峰起。

功放设计的艺术是塑造 $S(s)$ 来抑制你关心的东西（100/120 Hz 的电源纹波、最高到 20 kHz 的失真谐波），同时不在超声频率处出现放大噪声或对瞬态振铃的峰起。这是一个环路整形问题，正是 H∞ 和混合灵敏度设计解决的那种。音响设计师没有理由在数学现成的时候凭本能做事。

### 6.4 输出阻抗是 $Z_\text{out}(s) = Z_\text{open}(s) \cdot |S(s)|$

功放的输出阻抗——音响人叫"阻尼系数"——是开环输出阻抗除以环路增益。这是反馈理论的直接结论：反馈按回差 $1+L$ 降低输出阻抗。

但 $L$ 随频率下降。所以输出阻抗随频率*上升*。"100 Hz 处阻尼系数 1000"听起来很牛。在 10 kHz，同一台功放的阻尼系数可能是 10。高音单元看到的功放与低音单元看到的功放完全不同。这就是为什么有些功放尽管频率响应平坦，听起来却"亮"或"低音少"——输出阻抗与扬声器自身阻抗曲线相互作用，在功放端口形成了一个随频率变化的电压分压。

控制理论给了你思考这个问题的方式：$Z_\text{out}(s)$ 是一个由环路增益塑造的频率相关量。音响营销想要一个单数。物理说没有单数。

---

## 7. 控制理论可以从音响学到什么

这不是单向的。音响功放设计师在让控制理论家不舒服的约束下工作，他们也发展出了一些真正的心得。

### 7.1 失真在频域中很重要

控制理论压倒性地是一种线性理论。非线性效应用描述函数、小信号线性化或最坏情况鲁棒性来处理。这些方法都无法捕捉音响人关心的东西：非线性对象在反馈环路内产生的失真的精确频谱。

音响设计师关心谐波落在*哪里*（2 kHz 的 2 次谐波比 7 kHz 的 7 次谐波不那么令人反感，而不和谐的互调产物比这二者更讨厌）。他们发展了精巧的测量协议（CCIF、DFD、多音）来探测环路，控制理论不去探测。系统理论可以从中学到：非线性反馈系统产生的误差是结构化的，不是随机的，而且结构很重要。

### 7.2 对象可以改进，而不只是补偿

控制理论假设对象是给定的。音响设计师花巨量精力改进"对象"——输出级——在反馈进来之前就降低其开环非线性。A 类偏置、误差校正（Hawksford）、前馈（又是 Black，另一种形式）、复合晶体管拓扑。

洞见：开环时对象越线性，反馈环路要做的工作就越少，环路设计的要求就越不苛刻。音响设计师直观地理解反馈线性化是乘积关系——最终 THD = 开环 THD / 环路增益——因此优化分子和最大化分母同样重要。

控制理论可以把它形式化为对象设计和控制器设计的联合优化，这在实践中很少做，因为大多数行业里对象和控制器由不同团队设计。

### 7.3 听感测试是真实的，尽管控制不够严格

控制理论家不屑于主观听感。可以理解——发烧友世界充满了可证明的胡说八道（线材升降台、CD 消磁器、一万美元的电源线）。但核心主张——训练有素的听者能区分测量指标相同的功放——在恰当控制的盲听测试中已被验证。

这告诉我们的是，我们的测量套件是不完整的。功放行为的某些方面——音乐信号下的动态行为、瞬时过载后的恢复、失真频谱包络——没有被静态正弦波 THD 捕捉到。控制理论的瞬态指标（调节时间、超调、积分绝对误差）更接近耳朵关心的问题，但即使这些也不能完全解释数据。

这是一个机会。耳朵是一种精密的传感器。如果它能察觉到我们仪器察觉不到的差异，正确的回应是找到更好的仪器，而不是否定耳朵。控制理论有分析工具。它只是还没有把它们应用到正确的测量上。

---

## 8. 统一

最终，一台音响功放*就是*一套控制系统。开环放大器是对象。补偿电容是控制器。反馈电阻设定参考跟踪。电源纹波是扰动。扬声器负载是对象不确定动力学。

数学是完全相同的。差异是文化的、历史的、商业的。音响的文化在远离控制理论的地方独立发展，积累了自己的术语、自己的传闻、自己的部落争端。1970 年代的"反馈战争"是一场完全不用控制理论进行的控制理论辩论——而且得出了错误的结论。

一代学会 Bode 图、灵敏度函数和环路整形的音响设计师——他们把功放看作一个反馈系统，而不是"加了负反馈"的电路——将设计出更好的功放。他们将不再争论反馈是"好"还是"坏"，而是开始问正确的问题：20 kHz 处有多少环路增益？容性 2 µF 负载下相位裕度多少？灵敏度峰在哪里？这些都是带音响答案的控制问题。

而一代认真对待音响的控制理论家——面对它对线性度、带宽、以及在荒唐不可知的负载下的鲁棒性的极端要求——可能会发现音响人试错方法的种子里包含着新理论。

两个部落分离了 80 年。是时候合流了。

## 关于

本文以 **Bruno Putzeys** 的口吻写成——音响工程师、控制理论布道者、曾任 Philips、Hypex、Grimm Audio 设计师，现为 Purifi Audio 设计师。他以将严格的控制理论应用于 D 类功放设计、论证"做得对的情况下反馈越多越好"、以及公开拆穿关于负反馈的发烧友神话而闻名。

参见：Putzeys, B. (2019). "The F-word, or why there is no such thing as too much feedback." *Linear Audio*, Vol. 17。以及 AES 大会上的各种演讲。
