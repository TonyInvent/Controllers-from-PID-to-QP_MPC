# 为什么音响功放设计与控制理论说着不同的语言

**一台音响功放就是一套反馈控制系统。不是"类似"，不是"可以看作"——它就是。但你去问一个音响设计师和一个控制工程师同一台电路，你会得到两种语言、两套测量、和完全不同的结论。这篇文章试图搞清楚：两个领域看着同一个东西，怎么就看出了两样东西。**

---

## 1. 同一个环路，两个部落

一台功放的完整信号流，用控制方框图可以一字不差地画出来：

- **"被控对象"** 是输出级——一堆功率晶体管往扬声器里灌电流。
- **"控制器"** 是输入级 + 电压放大级 + 那颗你从来不知道放多大的补偿电容。
- **"反馈网络"** 是输出端那两个分压电阻。
- **"设定值"** 是音乐信号。
- **"扰动"** 是电源纹波、负载变化、热漂移、以及输出晶体管天生的非线性——那些在开环状态下能把正弦波削成方波的玩意儿。
- **"误差信号"** 是输入与衰减后输出之差——差分对第一级干的就这事。

一个字母都不差。稳定裕度、环路增益、扰动抑制、带宽、压摆率、输出阻抗——同一个数学，同一种物理。

然后你走进一个音响展。一个穿毛衣的人告诉你他换了根电源线之后声场"打开了"。另一个在解释为什么他那台零反馈功放虽然 THD 比你那台高了三个数量级，但"音乐性"更好。第三个在卖你一万美元的线材升降架。

控制工程师看到这个场面会原地升天。

这不是玩笑。两个领域说的是同一件事，但词汇完全不重叠。音响工程师在谈论 THD、TIM、"声音特质"，以及 40 dB 的反馈是否"太多"——这个问题本身就像在问"氧含量是否太高"一样荒谬。控制工程师在谈论相位裕度、灵敏度函数、Bode 积分——这些词在音响界根本不存在。他们在描述同一台功放。但谁也不会认出对方在说什么。

怎么会搞成这样？

---

## 2. 历史的分叉：1940 年，两个人，两个方向

两个领域在 1940 年左右分道扬镳，之后再也没见过面。

### 控制那一支

控制理论长在工厂里。蒸汽机调速器、化工厂反应釜、船用自动驾驶仪、导弹制导。主导力量是应用数学——一帮举着滑尺的家伙，核心问题是稳定性和鲁棒性。因为炼油厂炸了很贵。飞机掉了所有人都不好过。这个文化崇尚未被证明的定理、保证过的裕度、和普适性。

到 1960 年代，控制理论已经有了状态空间、李亚普诺夫稳定性、最优控制。数学吓人。但他们搞的问题——导弹、化工过程、卫星姿态——跟音响半毛钱关系没有。

### 音响那一支

音响长在贝尔实验室和消费电子市场里。主导力量是电路设计。核心问题是噪声、失真、带宽，以及——这个才是真正的驱动因素——东西*好不好卖*。这个文化崇尚测量（THD、SNR 的数字游戏），和主观听感（完全不可复现，但没关系，写手爱写，读者爱看）。

Harold Black 1927 年在贝尔实验室发明负反馈放大器的时候，他的思考方式完完全全是一个控制理论家——用反馈来线性化一个非线性放大器，降低失真。但 1950–70 年代把功放做成商品的人，是电路设计师，不是控制理论家。他们的心智模型是电子管换成晶体管再换成运放。他们对反馈的理解是："把输出分一小部分反相送回输入。失真降环路增益那么多倍。别让它叫。"

这个模型**没错**。它只是控制理论对反馈能讲的故事里最浅的那一层。在那几十年里，够用了。

### 然后来了晶体管，然后来了一个芬兰人

两件事把沟挖成了峡谷。

第一，晶体管时代（1960 年代）让电路复杂到直觉彻底失效。电子管时代你可以靠经验活着。晶体管不行——它们是非线性的，在你看不到的地方，以你看不到的方式。

第二，1970 年代的"反馈战争"制造了一套平行神话，到现在——我说真的，2026 年了——还没被拆干净。

反馈战争是一个叫 Matti Otala 的芬兰工程师发动的。他观察到有些高全局负反馈的晶体管功放，主观听感不如那些反馈少得多的简单设计。他提出了一个机制——瞬态互调失真（TIM）——然后把高反馈推上了被告席。音响媒体像鲨鱼闻到血一样扑上来。"反馈是坏的"成了普遍信条。低反馈、零反馈、无反馈成了商业卖点——你能把同一个电路卖三倍价钱，只要你敢在面板上印"Zero Negative Feedback"。

从一个控制理论家的视角看，整件事是一场悲剧——Otala 识别出了真实的现象，但给出了完全错误的病因。问题不是*反馈*。问题是把反馈扣在了一个开环带宽太低、压摆率不够、相位裕度可疑的放大器上。你拿一根绳子拴在一匹瘸腿上，然后怪绳子限制了你跑步的速度——这就是 Otala 的诊断逻辑。正确的解不是*减少*反馈。正确的解是更好的环路设计：更宽的带宽、更高的压摆率、恰当的补偿。这些东西控制理论界 1975 年就讲得清清楚楚。但音响界没有人在读控制文献。控制界也没有人在想音响功放。

于是两个部落继续各走各的——各自的词汇，各自的设计规则，各自的神话。讨论同一个反馈环路，用着彼此认不出来的语言。

---

## 3. 测量的鸿沟：你量什么，你就相信什么

语言分歧最大的推手，不是理论，是**每个领域觉得什么东西值得上仪器**。

### 音响人量什么

| 测量 | 它抓了什么 | 音响人脑子里想什么 |
|------|----------|-----------------|
| **THD+N** | 1 kHz 正弦波进去，2 kHz、3 kHz……谐波 + 底噪出来 | "这盒子有多干净？" |
| **IMD** | 19+20 kHz 进去，看 1 kHz 差频 | "复杂信号下的表现？" |
| **SINAD** | 一个数 | "哪个更好？（我只需要一个数）" |
| **阻尼系数** | $Z_\text{load} / Z_\text{out}$，低频 | "能抓住低音不？" |
| **压摆率** | 输出能跑多快 | "能跟上瞬态不？" |
| **频率响应** | 20 Hz–20 kHz, ±0.1 dB | "音调平不平？" |

音响人在量输出端的*误差*，精度高到控制工程师会笑出来的水平：−120 dB 算"还行"，−130 dB 算"高端"。他们量的正是控制理论默认为线性的东西——谐波失真。控制理论说"系统是线性的"就当假设过了。音响人说"不，它不是，你看，这是证据，而且人耳听得出来。"

### 控制人量什么

| 测量 | 它抓了什么 | 控制人脑子里想什么 |
|------|----------|-----------------|
| **相位裕度 / 增益裕度** | 环路离起振还有多远 | "这东西会自己唱起来吗？" |
| **灵敏度函数** $S(s)$ | 扰动抑制 vs 频率 | "负载变了能压住吗？" |
| **互补灵敏度** $T(s)$ | 跟踪 + 噪声放大 | "跟得上参考吗？会不会放大噪声？" |
| **带宽 / 穿越频率** | 环路增益在哪儿碰到 0 dB | "能多快？" |
| **阶跃响应**（超调、建立时间） | 瞬态行为 | "被踢一脚会晃多久？" |
| **鲁棒裕度** | 对象不确定也稳得住吗 | "客户随便接什么喇叭都不会炸？" |

注意到了吗？音响在量稳态正弦波下的盒子输出——最多来个双音测试，已经很"苛刻"了。控制在量*稳定性边界*和*瞬态*行为。两群人通过完全不同的望远镜看同一个东西。

而最讽刺的是：**两组测量来自同一套环路的同一套数学。** 灵敏度函数 $S(s)$ 既决定 THD 降低（音响的命）也决定扰动抑制（控制的命）。互补灵敏度 $T(s)$ 既决定频响上的峰（音响的 ±0.1 dB 强迫症）也决定超调（控制的建立时间）。环路增益既决定阻尼系数（音响）也决定输出的扰动抑制（控制）。同一个量，不同的名字。两个部落都不知道对方管它叫什么。

---

## 4. 术语对照表：你的罗赛塔石碑

如果你懂控制理论，需要读懂音响功放论文，这是你的词典。如果你设计功放，需要跟控制工程师说话，反着查。

| 控制术语 | 音响术语 | 备注 |
|---------|--------|------|
| 对象 $G(s)$ | 开环放大器（前向通路） | 反馈扣上来之前的所有增益 |
| 控制器 $K(s)$ | 频率补偿网络 | 通常就一颗电容——某个频率处一个极点。就这 |
| 反馈 $H(s)$ | 反馈网络 | 电阻分压，基本是平的。这是整个系统里最简单的部分 |
| 环路增益 $L = GKH$ | 环路增益 | 同一个概念，同一张 Bode 图。他们居然共享了这个 |
| 灵敏度 $S = 1/(1+L)$ | 失真降低因子 | $L \gg 1$ 时 $S \approx 1/L$——"更多反馈 = 更低 THD"的数学根源 |
| 互补灵敏度 $T = L/(1+L)$ | 闭环增益 | 音响人只关心它的幅值，完全不管它的相位动态。这是个错误 |
| 相位裕度 | "方波振铃吗？" | 音响人没有这个词，但他们有这个概念 |
| 增益裕度 | "加个 Zobel 就不会叫了" | 同上。你设计功放的时候脑子里想的就是这个 |
| 穿越频率 $\omega_c$ | 单位增益频率 / GBW | 开环增益撞上闭环增益的地方 |
| 扰动抑制 | PSRR、CMRR、负载调整率 | 同一个量，拆成了三个名字 |
| 参考跟踪 | "频响 ±0.1 dB" | 他们以为这是独立指标——它其实是 $T(s)$ |
| 压摆率限制 | 压摆率限制 | 他们居然共享了这个词！也是 TIM 的真正来源 |
| 非线性对象 | 交越失真、晶体管非线性 | 音响极度关心——这是他们整个职业生涯的对手。控制基本假设线性 |
| 噪声整形（ΔΣ） | D 类调制器噪声整形 | 音响人自己*发明了*他们以为不存在的控制理论 |

这张表说明了一切：音响没有任何东西在控制理论之外。映射是完整的。区别纯属文化。

---

## 5. 三个战场：失真、负载、D 类

### 5.1 −120 dB 的执念

控制理论问："输出在设定值的 1% 以内吗？够用了。" 音响问："输出里有没有任何*输入里不存在*的频率分量，哪怕只有百万分之一？"

功放的对象（输出级）在没有反馈的时候是严重非线性的——B 类交越失真产生百分之几级别的谐波。反馈按环路增益把这玩意儿往下压。1 kHz 处环路增益可能有 60 dB，把 1% 的开环失真压到 0.001%。很漂亮。

但——20 kHz 呢？那里环路增益可能只剩 20 dB。1% 变成 0.1%。可闻。3 kHz 的第 7 次谐波（21 kHz）？那里环路增益可能连 10 dB 都不剩。放大器在那个频率上几乎不再线性化。这就是为什么有些功放"在高频变粗"——不是魔法，是环路增益滚降。

控制理论的线性近似对这些效应毫无感知。音响功放面对的是一个非线性对象，这个非线性*恰恰是你拼了命要压制的东西*，而且在你环路最弱的频率上最嚣张。

这就是为什么好功放设计师疯狂执着于开环线性度——A 类偏置、误差校正（Hawksford）、前馈——不是因为他们不相信反馈，而是因为他们太懂反馈了，知道反馈的效果随频率滚降，而音响要求全频带线性。这是个积分约束，不是品味问题。

### 5.2 你的负载是一头你从没见过的东西

大多数控制系统里，对象是清楚的。你知道你的电机、你的反应釜、你的飞行器。它被测量过、建模过、写过文档。

音响不一样。你的负载是扬声器。客户自己挑的一只扬声器。它的阻抗从 2 Ω 变到 40 Ω 随频率跑，带容性带感性相位角。功放得在*这头随便哪只怪兽*接上来的时候保持稳定。反馈网络——$H(s)$，那两个分压电阻——是放大器跟外部世界之间的唯一屏障。

这就是教科书级别的鲁棒控制问题。功放必须对一个大得离谱的不确定集内*所有可能的负载*保持稳定。控制理论为这个造了整套兵器——H∞、μ 综合、小增益定理。音响设计师怎么干的？经验法则。"输出串个电感。""输出加个 Zobel。""环路别在太陡的地方过 0 dB。"

他们在解决同一个问题。控制理论家会说：你在为一个对象不确定集设计。用 $S(s)$ 界定影响。音响设计师会说：加个 Thiele 网络。同一个答案，两套语言。

### 5.3 D 类：控制理论穿着音响的外衣闯进来了

D 类功放是音响和控制之间最暴力的碰撞。一台 D 类功放本质上是：

- 一个开关变换器（跟 BUCK 没啥区别）
- 扣在一个反馈环路里
- 驱动一个 LC 输出滤波器
- 带一个非线性调制器（比较器 + 三角波 = PWM）

这玩意儿是一个环路内部塞着非线性元件、前面摆着二阶谐振器（LC 滤波器在谐振点给你 180° 相位翻转）的控制系统。调制器带来延迟（开关频率）。电源带来扰动（纹波直接漏到输出）。而整个环路的带宽得干到 40 kHz 以上——才算真正的高性能音响。

控制理论对此有标准名称：这是一个电压模式控制的开关电源，带输出滤波器。电源工程师用 Bode 图和补偿器设计分析它。音响工程师管它叫"滤波器后反馈 D 类"，分析方式……怎么说呢，很多人就是试电容值试到不叫为止。

最好的 D 类设计师——Hypex、Purifi、TI、Infineon 那批人——明确地在用控制理论。他们把 PWM 调制器建模成带延迟的增益块。把 LC 滤波器建模成二阶对象。用标准环路整形设计补偿器。结果：120 dB SNR，0.0001% THD，全负载稳定，全频带干净。这是控制理论实打实地造出好音响的证明。但营销部管这叫"专利反馈拓扑"，不叫"鲁棒环路整形控制"。行吧。

---

## 6. 音响可以从控制学到什么

音响界在过去五十年里，一边试一边错，把控制理论的轮子重新发明了好几遍。以下是控制界几十年前就搞明白了，能立刻让任何功放设计变好的东西：

### 6.1 别再怕反馈了。怕糟糕的环路设计。

我就要死在这个山头上。谁来都不好使。

"反馈是坏的"这个发烧友运动，是一个范畴错误。他们听到某些高反馈功放声音不好。他们把这归因于反馈。他们*应该*把它归因于*糟糕的环路设计*。

一台设得好的功放——80 dB 环路增益、200 kHz 单位增益带宽、补偿到 60° 相位裕度——听起来干净、快、无色。一台 40 dB 环路增益、相位裕度在崩溃边缘、压摆率不够的功放，听起来会"颗粒感"或者"塞"。这不是反馈的量的问题。这是反馈的*品质*的问题。你去怪反馈，就像你去怪你的车有发动机所以费油——这根本不是变量。

控制理论教我们的是：反馈是工具。用对了，线性化、压扰动、降输出阻抗。用错了，振荡、振铃。反馈能加*多少*，是由你的对象和补偿器引入的相位滞后在穿越 0 dB 之前留给你的空间决定的。这是 Bode 积分，不是品味偏好。

### 6.2 测环路，别只管输出端那个单数

音响评测界在 8 Ω 阻性负载下测 THD+N 的痴迷，是建立在最省事条件下的最不说明问题的测量。它告诉你的只有一件事：这台功放在理想电阻下 1 kHz 的表现。它对稳定裕度、负载敏感性、瞬态行为——一句话，对这台功放*作为反馈系统实际怎么样*——什么都告诉不了。

如果有控制工程师来审你的功放，他会先看这四样：
- 开环增益 Bode 图
- 相位裕度和增益裕度
- 容性负载下的阶跃响应
- 输出阻抗 vs 频率

这四张图讲明白了一台功放作为系统的全部故事。THD 数字是环路设计的结果——它应该被推导出来，不是被供起来的。

### 6.3 灵敏度函数 $S(s)$ 是你最好的朋友，你却不知道它的名字

当音响设计师"加更多反馈"，他们在塑造的是 $S(s)$。环路带宽之内，$|S| \ll 1$——失真和电源噪声被压扁。环路带宽边缘及以上，$|S| \to 1$——什么都没被压，甚至还可能鼓起来（那叫灵敏度峰，你的功放在那个频率实际上在*放大*误差）。

功放设计的真正手艺是塑形 $S(s)$：在你关心的频率上狠压（100/120 Hz 电源纹波、最高 20 kHz 的失真谐波），同时不让它在超声频率鼓起来去放大噪声或者对瞬态振铃。这就是环路整形——H∞ 和混合灵敏度设计的标准动作。音响设计师在数学现成的时候还在靠本能调电容。

### 6.4 输出阻抗是一个函数。不是个数。

功放的输出阻抗——音响人执迷地叫做"阻尼系数"的那个东西——是开环输出阻抗除以环路增益。这是反馈理论的直接结论：反馈按回差 $1+L$ 降低输出阻抗。

但 $L$ 随频率滚降。所以输出阻抗随频率*爬升*。"100 Hz 阻尼系数 1000"听起来非常厉害。同一台功放，在 10 kHz，阻尼系数可能是 10。你的高音单元看到的是一个跟低音单元看到的完全不同的功放。这就是为什么有的功放，频率响应测着是平的，听起来却"亮"或者"低音松"——输出阻抗跟你喇叭自己的阻抗曲线在功放端口上分压，随频率变化。

控制理论给了你思考它的语言：$Z_\text{out}(s)$ 是一个频率相关的量，由环路增益塑形。音响市场部想要一个数。物理说你做梦。

## 7. 控制理论可以从音响学到什么

这不是单向输出。音响功放设计师在一些让控制理论家浑身不舒服的约束下干活，他们搞出了一些真东西。

### 7.1 非线性失真的频谱不是随机的

控制理论压倒性的是线性理论。非线性用描述函数、小信号线性化、或者最坏情况鲁棒性糊弄过去。这些办法没有一个能抓到音响人真正关心的东西：非线性对象在反馈环路里产生的失真*频谱*——哪个频率上出谐波、谐波的阶数分布、互调产物落在哪里。

音响设计师不是笼统地关心"有失真"，他们在乎失真落在*什么频率*上。2 kHz 的二次谐波不刺耳；7 kHz 的七次谐波极其刺耳；不和谐的互调产物比二者加起来都难听。他们发明了一整套测量协议（CCIF、DFD、多音）来探测环路在一个控制理论不去看的地方的行为。这里面的启示是真实的：非线性反馈系统产生的误差不是随机的，是结构化的，结构本身有感知意义。控制理论该把它吃进去。

### 7.2 对象是可以被改进的，不光是补偿

控制理论假设对象是给定的。音响设计师花巨量精力改进他们的"对象"——输出级——在反馈扣上来之前就把它弄得更线性。A 类偏置、误差校正（Hawksford，又是天才）、前馈（又是 Black，换了种形式）、复合管拓扑。这些不是替代反馈，是和反馈配合。

洞见：开环时对象越线性，反馈要做的事就越少，环路设计就越不苛刻。音响设计师直觉上就懂反馈线性化是乘积关系——最终 THD = 开环 THD / 环路增益——所以改善分子和最大化分母同样重要。控制理论可以把这个形式化为对象设计和控制器设计的联合优化，而不是像大多数行业那样把对象和控制器分给两个团队、各做各的、做完拼起来看运气。

### 7.3 耳朵不是玄学仪器

控制理论家对主观听感不屑一顾。我懂——发烧友圈子充斥着可证明的胡说八道。线材升降台。CD 消磁器。一万美元的电源线。声称能听出不同 USB 线的人，在双盲测试里准确率跟抛硬币一样。我花了职业生涯相当大一部分对抗这堆东西。

但这里有个但是。

经过恰当控制的盲听测试已经证实：训练有素的听者可以区分很多常规测量认为"完全相同"的功放。不是测错了——是测量套件不够。功放行为的某些维度——音乐信号下的动态行为、瞬时过载后的恢复、失真频谱包络——静态正弦波 THD 根本碰不到。控制理论的瞬态指标（建立时间、超调量、ITAE）更接近耳朵真正关心的东西，但即使这些也没完全解释数据。

这不是说"测量没用"。这是说：耳朵是一台高灵敏度传感器。如果它能发现仪器没发现的差异，正确答案是找更好的仪器，而不是骂耳朵是玄学。控制理论有分析工具。它只是还没把它们用对地方。

---

## 8. 该合流了

一台音响功放就是一台反馈控制系统。开环放大器是对象。补偿电容是控制器。反馈电阻设参考跟踪。电源纹波是扰动。扬声器是——我再说一遍——一个随频率乱跳的、你根本不认识的对象不确定动力学。

数学完全一样。差异是文化的、历史的、商业的。音响的文化在完全不知道控制理论存在的情况下自己长出来，积累了自己的术语、自己的传闻、自己的部落骂战。1970 年代的"反馈战争"是一场完完全全不用控制理论语言进行的控制理论争论——然后得出了错误的结论，然后那个结论变成了商品卖点，然后卖点变成了"常识"，然后五十年来没人去翻案。

一代学会了 Bode 图、灵敏度函数和环路整形的音响设计师——他们把功放看成反馈系统，而不是"被加了负反馈"的电路——会设计出更好的功放。他们将不再争论反馈"好还是坏"——这个问题的荒谬程度相当于在争论"因果关系好还是坏"——而是开始问正确的问题：我在 20 kHz 有多少环路增益？容性 2 µF 下相位裕度够不够？$S(s)$ 的峰在哪里？这些是控制问题，带音响答案。

而一代认真对待音响的控制理论家——面对它对线性度、带宽、以及在荒唐不可知的负载下鲁棒性的极端要求——可能会发现音响人用试错的方式播下的问题，藏着一系列新理论的种子。

分离了八十年。该合流了。同一套数学，同一个环路，同一个目标。
