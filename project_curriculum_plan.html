# Project Curriculum Plan: What to Add Next

**A 30-year veteran's perspective on what this project needs to turn curious students into engineers who can walk into any control problem and know which tool to reach for.**

---

## The philosophy

This project already has a strong backbone: five interactive simulators tracing the evolution from PID through LQR to MPC, plus a shelf of deep-dive documents explaining the theory. A student who works through all of them will understand *what* each controller does and *why* each generation built on the last.

What's missing is three things that separate a student who can follow a textbook derivation from an engineer who can stand in front of a real system and make it work:

1. **The bridge from data to model.** Every controller needs a plant model. Where does it come from? You can't solve a Riccati equation for a motor you haven't characterized. System identification is the missing first chapter.

2. **The bridge from state feedback to output feedback.** LQR gives you `u = −Kx`. But you almost never measure `x` directly. You measure `y = Cx` through noisy sensors. The observer/estimator is the missing middle.

3. **The engineer's survival kit.** Anti-windup. Discretisation pitfalls. Gain scheduling. Dead time. The things that kill you on a real system and that academic control courses often skip because they're "implementation details." They are not details. They are the difference between a controller that works in simulation and one that works on hardware.

Below is a prioritized plan for new explorers and deep-dives, organized by where they fit in the learning arc.

---

## Priority 1: System Identification (new explorer + deep-dive)

**Why it's first.** Every controller in this project — PID, LQR, MPC — assumes you know the plant. `A`, `B`, `C`, `D`. Where do they come from? A student who opens `lqr_explorer.html` sees `R=4, L=0.02, Kt=0.06...` but doesn't know how those numbers got there. This is the single biggest gap between this project and the real world.

**Proposed explorer:** `sysid_explorer.html`

- A plant simulator that runs behind a black box — the student sees only input/output data
- Apply a PRBS (pseudo-random binary sequence) excitation and watch the response
- Choose a model structure (1st-order, 2nd-order, with/without delay)
- Fit parameters via least squares — see the predicted vs actual output overlaid
- Validate on a held-out dataset (the "don't cheat" check)
- Display the identified transfer function and its uncertainty bounds
- **Key lesson:** the model is always an approximation, and the approximation has error bars

**Proposed deep-dive:** `system_identification.md`

- The fundamental problem: given `{u[k], y[k]}` for k = 1...N, find the system
- ARX, ARMAX, OE model structures and when to use each
- Least-squares estimation: the normal equations, the hat matrix, the residual
- PRBS design: why pseudo-random, how long, how fast
- Validation: residual whiteness test, cross-validation, the danger of overfitting
- From discrete-time identified model to continuous-time transfer function
- Connection to this project: how the motor parameters in the simulators were obtained

---

## Priority 2: Observer and Estimator Design (new explorer)

**Why it's second.** LQR gives state feedback. Real systems give sensor readings. The gap between `u = −Kx` (mathematics) and `u = −K x̂` (implementation) is where most academic controllers die. An observer is not an add-on — it's half the controller.

**Proposed explorer:** `observer_explorer.html`

- The same DC motor, but now you only measure position θ (via encoder) — velocity ω and current i are hidden
- The student designs a Luenberger observer: place observer poles, see how fast `x̂` converges to `x`
- Noise injection: add measurement noise and watch the observer filter it (or amplify it, if poles are too fast)
- Compare open-loop simulation (model runs without correction) vs closed-loop observer (model corrected by measurements)
- A Kalman filter mode: specify process noise Q_obs and measurement noise R_obs, see the optimal gain L emerge
- Show the **separation principle** in action: design K via LQR, design L via pole placement, combine into `u = −K x̂` — and the closed loop still works
- **Key lesson:** the observer is a feedback system too, with its own bandwidth, its own stability margins, and its own design trade-offs

**Proposed deep-dive:** `observer_design.md`

- Why full-state feedback is an assumption that never holds in practice
- The Luenberger observer: `x̂_{k+1} = A x̂_k + B u_k + L(y_k − C x̂_k)`
- Observer pole placement: 2–5× faster than controller poles — and why "faster" isn't always better
- The Kalman filter as optimal observer: same structure, different gain selection
- Duality: observer design = controller design for the transposed system
- The separation principle: when it holds (linear systems) and when it breaks (constraints, nonlinearities)
- Practical issues: sensor bias, missing measurements, multi-rate sampling

---

## Priority 3: Anti-Windup and Saturation (enhanced servo_motor_pid + deep-dive)

**Why it's third.** Every actuator saturates. The servo_motor_pid explorer already has voltage saturation and basic anti-windup, but it doesn't *teach* the topic. A student sees the integrator freeze when voltage hits ±Vmax, but doesn't understand *why* that works, what the alternatives are, or how the same problem manifests in LQR and MPC.

**Proposed enhancement:** Add an anti-windup mode selector to `servo_motor_pid.html`

- **No AW** — raw PID, integrator winds up, massive overshoot on exit from saturation
- **Clamping** — freeze integrator when saturated (current implementation)
- **Back-calculation** — feedback the saturation error to the integrator with a tracking time constant
- **Conditional integration** — only integrate when the control is "in range" and the error is "reasonable"
- **Observer-based AW** — use an observer to estimate what the plant state would be if saturation weren't happening
- Show all five side-by-side on the same step response

**Proposed deep-dive:** `anti_windup.md`

- The root cause: the controller's internal state assumes unlimited authority
- Integrator windup: why it happens, what it looks like, how to fix it
- Back-calculation: the standard industrial solution (`1/T_t` tracking time constant)
- Why MPC handles saturation natively (constraints enter the optimization) and why LQR doesn't
- The general anti-windup framework: conditioning the controller state to be consistent with the saturated plant input
- Connection to this project: why QP-MPC doesn't need anti-windup, and why that's its killer feature

---

## Priority 4: The Waterbed Effect and Fundamental Limits (deep-dive)

**Why it's fourth.** You can't cheat physics. Bode's integral says the integral of log|S(jω)| over all frequencies is zero — reducing sensitivity at one frequency *forces* it to increase elsewhere. This is the single most important theoretical result that practicing engineers don't know, and it explains why every controller design is a trade-off.

**Proposed deep-dive:** `bode_integral_waterbed.md`

- Bode's sensitivity integral: the proof, what it means, why it's inescapable
- The waterbed effect: push down here, it pops up there
- Implications for controller design: you can't make everything fast AND accurate AND robust
- RHP poles and zeros make it worse: they add positive terms to the integral
- Connection to this project: why PID, LQR, and MPC all face the same fundamental speed-vs-accuracy trade-off
- The design implication: choose *where* to pay the price, don't pretend you can avoid paying it

---

## Priority 5: Digital Control and Sampling (deep-dive)

**Why it's fifth.** Every controller in this project runs in discrete time (the simulators use RK4 with a fixed dt). But no document explains what changes when you go from s-domain to z-domain — aliasing, the ZOH, the w'-transform, the fact that a continuous-time pole at s = −100 maps to a discrete pole at z ≈ 0.9 (not 0). This is the theory behind "use DARE, not CARE."

**Proposed deep-dive:** `digital_control_sampling.md`

- Sampling: the ZOH, aliasing, the Nyquist-Shannon limit
- The z-transform: what it is, how it maps to the s-plane, the unit circle = stability boundary
- Discretisation methods: forward Euler, backward Euler, Tustin, ZOH-equivalent
- When Tustin is good enough (most cases) and when it isn't (very fast sampling, resonant systems)
- The w'-transform: a trick that lets you use continuous-time Bode design for discrete controllers
- Connection to this project: all simulators run at discrete dt; `care_vs_dare.md` explains the Riccati difference, this explains the *why*

---

## Priority 6: Root Locus (new explorer)

**Why it's sixth.** Every control textbook teaches root locus. It's the bridge between "turn this gain knob" and "the poles move like this." An interactive root locus explorer would let students see the branches move as they drag a gain slider — building the same intuition that MATLAB's `rlocus` gives, but accessible in a browser.

**Proposed explorer:** `root_locus_explorer.html`

- A configurable plant: place poles and zeros on the s-plane by clicking
- Drag a gain slider from 0 to ∞ and watch the closed-loop poles trace the root locus
- See the branches emerge from open-loop poles, terminate at open-loop zeros (or infinity)
- Asymptotes, breakaway points, and the imaginary-axis crossing shown interactively
- Click on a branch to see the corresponding step response at that gain
- **Key lesson:** the root locus is the story of what happens to your closed-loop poles as you turn the gain

---

## Priority 7: Cascaded Control Loops (deep-dive + servo enhancement)

**Why it's seventh.** Real motor control isn't one PID loop. It's an inner current loop, a middle velocity loop, an outer position loop — each with its own bandwidth, nested. The servo_motor_pid explorer treats the motor as a single PID loop; real servo drives decompose it.

**Proposed deep-dive:** `cascaded_control.md`

- Why cascade: bandwidth separation, disturbance rejection at each level, saturation management
- The standard motor cascade: current (fastest) → velocity → position (slowest)
- Tuning rule: inner loop 5–10× faster than the next outer loop
- Anti-windup in cascaded loops: each loop handles its own saturation
- Connection to this project: how `servo_motor_pid.html` could be decomposed into three nested controllers

---

## Priority 8: Gain Scheduling (deep-dive)

**Why it's eighth.** Most real systems are nonlinear. The most common industrial solution is gain scheduling — design linear controllers at multiple operating points and interpolate between them. It's not theoretically elegant (stability between design points isn't guaranteed), but it ships.

**Proposed deep-dive:** `gain_scheduling.md`

- The problem: nonlinear plant, linear controller, how to bridge the gap
- The method: pick scheduling variable(s), design controllers at grid points, interpolate
- When it works: slow variation of scheduling variable relative to closed-loop bandwidth
- When it fails: hidden coupling terms, fast variation, lack of stability guarantees
- LPV (Linear Parameter-Varying) control as the theoretical upgrade
- Connection to this project: how gain scheduling relates to MPC (scheduling = memoryless, MPC = predictive)

---

## Priority 9: H-Infinity and Robust Control (deep-dive)

**Why it's ninth.** The Youla parameterization doc already explains that H∞ is a convex optimization over Q. But it doesn't explain *what H∞ control actually does* — how it handles model uncertainty, what the mixed-sensitivity formulation looks like, and when you'd reach for `hinfsyn` instead of `lqr`.

**Proposed deep-dive:** `h_infinity_robust_control.md`

- The motivation: your model is wrong. H∞ designs for the worst-case plant in an uncertainty set
- The mixed-sensitivity formulation: shape S(s) for performance, T(s) for robustness, KS(s) for control effort
- Weighting functions: how to translate "I want < 1% error below 10 rad/s" into a frequency weight
- The DGKF solution: two Riccati equations, one controller
- Why H∞ controllers are high-order and how to reduce them
- Connection to this project: Youla → H∞ is the optimization story; this is the engineering story

---

## The updated learning arc

With these additions, the recommended path through the project becomes:

```
1. PID Explorer                  — build intuition on a simple plant
2. Root Locus Explorer           — understand where poles go when you turn a knob
3. Zero-Effect Explorer          — understand what zeros do to the response
4. Lead/Lag Compensator Explorer — learn to shape Bode plots directly
5. Servo Motor PID               — apply PID to real motor physics
6. Anti-Windup (enhanced)        — handle the first hard reality: saturation
7. System Identification Explorer — learn where models come from
8. LQR Explorer                  — optimal state feedback
9. Observer Explorer             — bridge from state feedback to output feedback
10. QP-MPC Explorer              — constraints enter the optimization
11. Deep dives (in parallel)     — theory as you need it
12. Gain Scheduling / H∞         — advanced topics for specific problems
```

Each explorer builds on the previous. The deep-dives are placed where the theory answers a question the explorer raises. A student who completes 1–10 will have both the practical intuition and the theoretical foundation to tackle real control problems.

---
