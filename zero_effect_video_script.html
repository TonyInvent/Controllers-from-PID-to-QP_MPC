# Video Script: What Zeros Do to Your Second-Order System

**Estimated duration:** 12–15 minutes
**Visuals:** Refer to the three figures generated by `zero_effect_demo.py`

---

## SCENE 0 — Hook (0:00–0:45)

**[Visual: Show Figure 1 (both panels) full-screen, then zoom into the LHP side]**

> Here are six step responses, all from the exact same second-order plant. Same poles, same natural frequency, same damping ratio. But look at the difference — one has barely any overshoot, another shoots past the setpoint by almost 100%. And this one over on the right? It *goes the wrong way first*.
>
> The only thing I changed is a single **zero**.
>
> **Key question for you:** Before we dive in — if you're tuning a PID controller and you add derivative action, you're adding a zero. Have you ever stopped to ask: *where* exactly am I placing that zero, and what is it going to do to my transient response?
>
> By the end of this video, you'll know exactly how to answer that.

---

## SCENE 1 — The baseline: no zero (0:45–2:30)

**[Visual: Figure 1 left panel, highlight only the "no zero" trace in bold]**

> Let’s start with something familiar. A standard second-order system:
>
> *G(s)* = omega-n-squared over *s² + 2 ζ omega-n s + omega-n-squared*.
>
> Two poles, no zeros. In our demo, zeta is 0.5 — underdamped — and omega-n is 2 radians per second.
>
> The step response is the textbook underdamped curve we all know: it rises, overshoots a bit, rings a couple of times, and settles to 1. About 16% overshoot for this damping. This is our baseline.

**[Visual: Pole-zero map (Figure 3), but ghost out the zero — only show the two complex poles]**

> Those two poles sit here, in the left half-plane, as a complex-conjugate pair. Their real part sets the decay rate. Their imaginary part sets the oscillation frequency. Everything about this response is determined by just these two numbers.
>
> Now, what happens if I add a zero?

---

## SCENE 2 — What IS a zero, intuitively? (2:30–4:00)

**[Visual: Simple hand-drawn-style animation or slide]**

> A transfer function is just a ratio of polynomials. The denominator's roots are the poles — they govern the *modes* of the system, the natural behaviors. The numerator's roots are the zeros — they govern how strongly each mode gets *excited* by the input.
>
> Here's the intuition that actually matters: A zero adds a **derivative term** to the response. If the original system is *y(t)*, adding a zero at *s = −z* gives you something proportional to *y(t) + (1/z) · dy/dt*.
>
> Think about that. The output is now the original response *plus* a scaled version of its slope. When the slope is steep — during the initial rise — that derivative term gives the output an extra kick. That kick is what causes all the behavior we're about to see.
>
> **Key question:** Based on that intuition — where should the slope term matter most? Early in the response or late? And what does that tell you about when a zero exerts its influence?

---

## SCENE 3 — LHP zeros: the derivative kick (4:00–6:30)

**[Visual: Figure 1 left panel, animate traces appearing one by one]**

> Let's see this play out. I'll add zeros in the left half-plane — at s = −10, −4, −1.5, and −0.8 — and compare each one to the baseline.

**[Highlight z = −10 vs baseline]**

> First, z = −10. This zero is far away from the origin — five times farther left than the natural frequency. The step response barely changes. This zero's derivative term, *1/10 · dy/dt*, is tiny. The lesson: **a zero far from the origin is practically invisible.**

**[Highlight z = −4, then z = −1.5]**

> Now z = −4. Closer. The overshoot grows, the rise time shrinks a little. The derivative kick is starting to matter.
>
> z = −1.5 — now the zero is *inside* the pole radius. The overshoot jumps dramatically, and the rise time drops further.

**[Highlight z = −0.8 in a contrasting color]**

> And z = −0.8 — the zero is now *closer to the origin than the real part of the poles*. Look at that overshoot. It's enormous. The derivative kick is so strong that it dominates the early response.
>
> **Key question:** Why does a zero *closer to the origin* have a bigger effect? (Hint: look at the derivative term — *1/z · dy/dt*. As z gets smaller, the weight on the derivative gets *larger*.)
>
> **Key takeaway:** A left-half-plane zero gives you a trade-off — faster rise time, but more overshoot. The closer the zero is to the origin, the more aggressive the trade-off. This is exactly what adding derivative action in a PID controller does — it places a zero somewhere, and *where* you place it matters enormously.

---

## SCENE 4 — RHP zeros: when the system lies to you (6:30–9:00)

**[Visual: Figure 1 right panel, animate traces one by one]**

> Now the weird stuff. What if the zero is in the *right* half-plane? At s = +6, +2.5, +1.2, +0.7.
>
> For a right-half-plane zero, the numerator term is *(1 − s/z)* instead of *(1 + s/z)*. The output becomes *y(t) − (1/z) · dy/dt* — the derivative term is *subtracted*.
>
> Watch what happens.

**[Highlight z = +6]**

> z = +6 — far away, barely noticeable. Same rule: distant zeros don't matter much.

**[Highlight z = +2.5, then z = +1.2]**

> z = +2.5 — you can see it now. The response initially dips *below zero* before climbing toward the setpoint. The subtraction of the derivative term during the steep initial slope pushes the output in the *opposite direction* of where it's ultimately going.
>
> z = +1.2 — the undershoot is deeper and longer.

**[Highlight z = +0.7, pause for effect]**

> z = +0.7 — look at this. The system first goes *negative* by a large margin, then slowly recovers, crosses zero, and eventually reaches the setpoint. If this were a real process and an operator saw the output going the wrong way, what would they do? They'd probably intervene — add more input — and make things far worse.
>
> **Key question:** Can you think of a physical system where adding input temporarily makes the output go the *wrong* direction before it goes the right direction?
>
> Classic example: a boiler. You add cold feedwater → the water level *drops* (the cold water collapses the steam bubbles) → then the level rises as more water accumulates. That initial drop is a right-half-plane zero in action. It's not a sensor problem, it's not a valve problem — it's built into the physics of the system.
>
> **Key takeaway:** Right-half-plane zeros are fundamental limitations. No controller can remove them. They impose a *bandwidth limit* — you cannot make the system respond faster than roughly *z/2* without the undershoot becoming unacceptable. If you try, the system fights you.

---

## SCENE 5 — More zeros, more drama (9:00–10:15)

**[Visual: Figure 2]**

> What if we add *two* zeros? To keep the transfer function proper — denominator order at least as high as numerator order — I've added a fast pole at s = −10. This pole is so fast it barely affects the second-order character.

**[Step through the traces]**

> Baseline: the third-order system with no zeros looks almost identical to our original second-order response.
>
> One zero at z = −3: overshoot increases, as expected.
>
> Two zeros at z = −3 and −5: more overshoot still — each zero adds its own derivative kick, and they compound.
>
> Two zeros at z = −1.5 and −3: one very close to the origin and one moderate — the overshoot is massive now.

**[Pause]**

> **Key question:** If adding zeros increases overshoot, why would anyone ever *want* to add a zero? What's the benefit?
>
> Answer: **speed.** Look at the initial slope of each trace. Systems with zeros reach the setpoint *faster*. In many applications — robotics, servo control, aerospace — hitting the target quickly matters more than a clean, overshoot-free response. The zero is how you buy speed.
>
> The art of control design is understanding this trade-off between speed and overshoot, and knowing where to place your zeros to get the balance you need.

---

## SCENE 6 — The big picture (10:15–12:00)

**[Visual: Return to the full Figure 1, both panels side by side]**

> Let's zoom out and connect everything.

**[Use a pointer or highlight to walk through the argument]**

> 1. A zero adds a term proportional to the derivative of the original response.
>
> 2. The sign of the zero determines whether that term *adds* to the response (LHP zero) or *subtracts* from it (RHP zero).
>
> 3. The magnitude of the zero — its distance from the origin — determines the *weight* of the derivative term. Closer to origin = heavier weight = stronger effect.
>
> 4. LHP zeros (minimum-phase) create a speed-versus-overshoot trade-off — a design choice you can make.
>
> 5. RHP zeros (non-minimum-phase) create an *inescapable* limitation — undershoot you cannot eliminate, and a hard speed limit you must respect.

**[Visual: Simple diagram — controller → plant → output]**

> **Final key question:** When you tune a PID controller and crank up the derivative gain, you are placing a zero. Do you know where it's going? Is it a *helpful* LHP zero giving you speed, or is it interacting with your plant to create an effective RHP zero that introduces undershoot?
>
> Next time you're looking at a step response, ask yourself three things:
> - Is there overshoot or undershoot beyond what my poles predict?
> - If so, where are my zeros?
> - Are my zeros working *for* me or *against* me?

---
