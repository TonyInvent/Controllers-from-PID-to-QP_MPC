# 反馈的世纪：控制理论演化史

**约50分钟播客稿 —— 从瓦特的飞球到让火箭着陆的优化引擎，穿越250年反馈控制的演化。**

---

## 序章 — 那个一切的开端

**画面：** 一个直流电机在工作台上转动。一只手伸过来施加扰动扭矩。轴抖了一下，又恢复。三个标签在电机旁淡入淡出——*1788：飞球*，*1942：查表整定*，*1960：Riccati方程*，*1978：在线QP*。字幕：「一个电机。一个控制问题。二百五十年的思路。」

---

**旁白：**

如果你想让一个直流电机转到指定角度并停在那里——做一个伺服——你需要回答一个问题，且只有一个问题：已知轴现在的位置和你想要它去的位置，*此刻*应该施加多大电压？

听起来很简单。误差大，用力推；接近目标，慢慢减。这是比例控制。一个聪明的高中生十分钟就能发明出来。

但然后现实就来了。电机有惯性——它会超调。轴承有摩擦——稳态误差悄然出现。放大器只能输出12V，而你的控制器刚才要了30V。一个扰动扭矩撞到轴上——控制器浑然不知。绕组有电感——电流不会瞬间变化。轴有柔度——它不是刚体，是弹簧。这每一个现实，都在打破那个简单的比例想法。

而*把这个问题答好*——同时处理惯性、摩擦、饱和、扰动、动力学、约束——消耗了过去250年里一些最卓越的头脑。三代工程师、数学家和物理学家，看着本质上同一台电机，给出了三种截然不同的答案。不是因为电机变了。而是因为**他们手里有什么东西**变了。他们懂的数学。他们能摸到的计算机。他们被雇来真正解决的问题。

这就是这三个答案的故事——PID、LQR、QP-MPC——以及在它们之前隐藏的那一个世纪。一个关于船和蒸汽机、关于电话线和登月舱、关于炼油厂和优化理论的故事。关于一群人的故事——Maxwell、Sperry、Minorsky、Nyquist、Bode、Ziegler、Nichols、Bellman、Pontryagin、Kalman、Richalet、Cutler、Mayne——他们各自看到了同一问题的不同版本，并在解决它的过程中，重新定义了"控制一个东西"的含义。

让我们从头讲起。在PID之前。在任何人说出"控制器"这个词之前。

---

## 第一篇 — 前史（1788–1910）

### 在任何人说出"PID"之前

**画面：** 1790年代纺织厂里的横梁蒸汽机。巨大的摇臂上下摆动。飞轮旁，一对铜球在中心轴上旋转——转速升高，球上升；转速下降，球落下。连杆连接它们到蒸汽阀。剖面动画：飞球上升 → 连杆拉动节流阀关闭 → 引擎减速 → 飞球下落 → 节流阀打开。循环往复。

---

**旁白：**

### 磨坊主的直觉

最早的反馈控制器不是被"设计"出来的——是被**发现**的。

想象一个1790年的磨坊主。他有一座水车带动磨石。水槽满时，轮子转得快。水位下降，轮子变慢。研磨不均。于是他做了个浮球阀——一个木球浮在水槽里，连着闸门。水多，球升，关闸，减流。水少，球降，开闸。这是一个负反馈回路，用木头、绳子和试错搭出来的。

他不明白为什么。他只注意到，如果连杆太猛，水位就振荡——*哗，啪，哗*——他就把螺丝往回拧，直到不晃为止。这是数学之前的控制时代：纯经验整定。调到看起来差不多。然后走人。

但真正的故事，始于蒸汽。

### 瓦特的调速器 —— 1788

到1788年，詹姆斯·瓦特已经改造了蒸汽机。他的分离式冷凝器（1765）和双作用气缸（1782）使蒸汽动力高效到足以驱动英国的工业革命。但有一个问题瓦特还没解决：**速度调节。**

一台驱动棉纺厂的蒸汽机，需要在任何负载下都保持恒定转速。一台织机接入，负载增加，引擎减速，纱线断裂。一台织机脱开，负载骤降，引擎飞转，机械震散。当时的解决方案是人——一个操作员看着引擎，手动调节蒸汽阀。慢。走神。贵。

瓦特的解法，来自他的商业伙伴马修·博尔顿的建议，是**离心调速器**——一对铜球装在由引擎驱动的转轴上。转速升高，离心力把球向外向上推，拉动连杆关小蒸汽阀。转速下降，球落下，阀门重新打开。优雅，机械，全自动。不需要操作员。

瓦特并没有发明离心调速器——克里斯蒂安·惠更斯在17世纪就为风车用过类似的机构。但瓦特把它适配到蒸汽机上，是反馈控制成为*工业*技术的时刻。这是一台能够自我调节的机器。而且至关重要。到1868年，仅英格兰就有超过75,000台调速器在运转。工业革命跑在反馈上，不管有没有人理解它。

但理解，即将到来。

### 麦克斯韦与稳定性的数学 —— 1868

詹姆斯·克拉克·麦克斯韦以电磁学闻名——那四个描述从无线电波到光的方程。但在1868年，麦克斯韦把他的注意力转向了一个更朴实的问题：为什么调速器有时会振荡而不是稳定？

他的论文《论调节器》是**第一个对反馈控制系统的数学分析**。麦克斯韦写下了几种调速器的微分方程，在平衡点附近线性化，并证明：稳定性取决于特征方程根的位置。如果有任何根的实部为正，系统就会振荡——工程师们称之为"hunting"（追逐振荡）。

这是一个深远的洞见。麦克斯韦在说：*反馈有数学*——你可以写下方程，求解根，预测稳定性，根本不用造出机器。他在1868年做的事，就是今天每个控制工程学生在大一课程里还在做的事。

但麦克斯韦撞到了墙。对二阶系统，根由二次公式给出。三阶和四阶，有三次和四次公式——繁琐，但可计算。但对五阶系统——麦克斯韦自己的调速器设计正是五阶——根没有代数公式可用。麦克斯韦能写出特征方程，却解不出来。他在论文结尾发出一声恳求：天下数学家们，请找出一种方法，能够在*不求根*的情况下判断多项式的所有根是否具有负实部。

### 劳斯、赫尔维茨与稳定性判据的诞生

九年后，1877年，一位年轻的剑桥数学家**爱德华·约翰·劳斯**回应了麦克斯韦的呼唤。劳斯——他在史密斯奖考试中击败过麦克斯韦本人——发明了一种算法：一张数字表，由特征多项式系数构建，其第一列揭示了不稳定根的存在。不需要求根。只做算术。

1895年，德国数学家**阿道夫·赫尔维茨**用行列式的方法独立推导出相同的判据，不知道劳斯的工作。今天，我们称之为**劳斯-赫尔维茨稳定性判据**，是每个控制课学生在传递函数之后学的第一件事。这是第一个系统性的稳定性测试。它明确回答了麦克斯韦1868年的问题——并在接下来的五十年里，一直是这个领域的最高水平。

### 李雅普诺夫与现代控制的种子 —— 1892

但这个时代最有预见性的工作，来自一位领先于时代数十年的俄罗斯数学家。

**亚历山大·米哈伊洛维奇·李雅普诺夫**1857年生于俄国雅罗斯拉夫尔。父亲是天文学家，母亲是数学家。他在圣彼得堡大学师从伟大的切比雪夫。1892年10月12日，李雅普诺夫通过了他的博士论文答辩：*《论运动稳定性的一般问题》*。

李雅普诺夫提出的东西是革命性的。不是线性化系统然后检查特征值——那是麦克斯韦-劳斯的路线——李雅普诺夫的问题是：我们能否直接为*非线性*系统证明稳定性，而不解微分方程？

他的答案就是今天我们所说的**李雅普诺夫直接法**：找一个标量函数*V(x)*——就像能量——它在轨迹上始终为正且始终递减。如果这样的函数存在，系统就是稳定的。你不需要解任何东西。你只需要找到合适的函数。

这是天才的。它是普适的。它适用于非线性系统、时变系统、太复杂而无法线性化的系统。而西方世界，完全没有人注意到。

李雅普诺夫的工作1892年以俄文发表，1907年译为法文，然后被英语控制学界忽视了超过六十年。他于1918年悲剧性地去世——在他妻子的葬礼当天，死于自枪，显然无法承受丧妻之痛。他的工作直到太空竞赛使非线性控制成为国家存亡问题才被重新发现。当卡尔曼在1960年需要为LQR做稳定性证明时，他伸手拿起的工具是李雅普诺夫的第二法——而提出这个方法的那篇论文，当时已经68岁了。

### 前史给我们的启示

所以到1910年，理论基础其实已经相当深厚。数学家们贡献了：微分方程（麦克斯韦）、稳定性判据（劳斯、赫尔维茨）、以及一个普适的非线性稳定性理论（李雅普诺夫）。但工程界——机器、工厂、船舶的世界——几乎什么都没有吸收。调速器还在凭手感调。反馈仍然是你*用*的东西，不是*理解*的东西。

这一切就要变了。而改变，来自大海。

## 第二篇 — 第一幕：PID（1910–1942）

### 直觉变为数学

**画面：** 一艘美国海军战列舰，新墨西哥号，在约1922年的惊涛骇浪中破浪前行。甲板下：一台陀螺罗盘在万向架中旋转。切至三项控制器示意图：比例、积分、微分项汇入一个指令。然后：黄昏中的炼油厂，1930年代——气动控制器排列在控制室墙上，挡板-喷嘴机构嘶嘶作响。然后：一个技术员拿着秒表，在纸带记录仪上记录阶跃响应曲线。

---

**旁白：**

### 那艘需要保持航向的船

如果你想知道PID控制为什么存在，去看一条船。

海上的船承受着持续、不可预测的扰动——风、浪、流。它有巨大的惯性。它的操舵动态随航速、吃水和海况变化。而仅仅是几度的航向偏差，维持数小时，就意味着抵达错误的海港。

在20世纪之前，解法是一个人——舵手。有经验的舵手其实相当出色——他会预判，会纠偏，不会矫枉过正。他用的就是我们今天称为*比例*的动作（响应偏差大小）、*微分*的动作（响应偏差变化快慢）、以及某种类似*积分*的动作（注意到自己总是偏左一点点，然后轻轻压右舵来弥补）。但人会疲劳。人会走神。在战斗中，人会死。

这个问题吸引来了那个时代最伟大的发明家-企业家之一。

### 埃尔默·斯佩里与"金属麦克" —— 1911

**埃尔默·安布罗斯·斯佩里**1860年生于纽约州科特兰。他拥有那种美国镀金时代以财富回报的永不停歇的创造头脑。20岁创办第一家制造弧光灯的公司。30岁在造电动汽车和矿山机械。他最终积累了350多项专利，创办了八家公司。

但让他成名的发明是陀螺罗盘。

钢船上的磁罗盘几乎无用——船体自身的钢铁扭曲了磁场。斯佩里的陀螺罗盘利用旋转转子对地轴的追踪来寻找真北。这是一件优雅的物理作品。到1911年，美国海军已在全舰队安装斯佩里陀螺罗盘。

但斯佩里看到了更进一步的可能。如果你有一个能*感知*航向的陀螺罗盘，和一个能*施加*舵角的电动操舵机，为什么不把二者连接起来？为什么不直接让陀螺罗盘来掌舵？

结果就是**"金属麦克"**——第一个实用的船舶自动驾驶仪，1911年被美国海军采用。金属麦克用陀螺罗盘测量航向偏差，然后施加与之成比例的舵角。偏差大，舵角大——*比例控制*。它甚至会预判——从陀螺仪感知到转向速率，在偏差实际归零之前就开始回舵。这就是*微分控制*，用旋转的铜和钢以机械方式实现的。斯佩里的装置还能感知持续的风偏，缓慢调整舵角来补偿——这是*积分控制*的机械形态。

金属麦克成功了。它能在耗尽人类船员体力的风暴中稳稳掌舵。到第一次世界大战，斯佩里自动驾驶仪已是盟军战舰的标配。

### 劳伦斯·斯佩里的巴黎表演 —— 1914

然后埃尔默的儿子劳伦斯把这个想法带进了第三维。

劳伦斯·斯佩里是飞行员、工程师，也有几分表演家。1914年，在巴黎的一场航空安全竞赛中，他驾驶一架安装了父亲陀螺稳定器的柯蒂斯水上飞机。在人群注视下，劳伦斯和他的机械师埃米尔·卡钦双双爬出驾驶舱，走到机翼上。飞机，无人操纵，直线水平飞行——由三个以7000 RPM旋转的陀螺仪稳定，连接着副翼、升降舵和方向舵。

人群疯了。斯佩里赢得了15000金法郎的奖金。现代航空的支柱——自动驾驶仪——诞生了。十年之内，斯佩里自动驾驶仪已在定期客运航线上引导飞机。劳伦斯本人后来于1923年去世，年仅30岁，在浓雾中尝试独自飞越英吉利海峡时遇难。但他演示过的技术活了下来。

### 米诺尔斯基与正式的三项控制器 —— 1922

斯佩里的自动驾驶仪管用。没人怀疑。但设计是凭经验的——斯佩里调整连杆和弹簧张力，直到船"感觉对了"。没有理论。没有方程。没办法在海试之前预测性能。

1922年，这一切改变了。一位名叫**尼古拉斯·米诺尔斯基**的俄裔美籍海军工程师发表了一篇论文，这篇论文将成为PID控制理论的基石。

米诺尔斯基1885年出生，在俄国受教育，革命前曾在沙俄帝国海军服役。移民美国后，他为美国海军从事船舶稳定问题研究。他1922年的论文*《自动操舵体的方向稳定性》*，发表在《美国海军工程师学会杂志》上，是对我们今天称为PID控制器的最早严格理论处理。

他的方法是简单而绝妙的：**观察最优秀的人类舵手，反向工程他们的一举一动。** 米诺尔斯基观察到了三种不同的行为：

1. **他们对航向偏差的大小作出响应。** 偏差大，舵角大。这就是比例动作。

2. **他们对偏差的变化速率作出响应。** 如果偏差在快速闭合，他们会在偏差到达零*之前*开始回舵。他们在预判。这就是微分动作——通过阻尼响应防止超调的D项。

3. **他们注意到了持续的偏航。** 如果船总是往左偏一度，舵手学会了保持轻微的右舵偏置。这就是积分动作——积累过去误差并加以修正的I项。

米诺尔斯基将这三者形式化为一个控制律——三项控制器——并从数学上分析了其稳定性。他是第一个证明稳健的船舶操舵*三项都需要*的人：P单独存在会有稳态误差；加上I消除了误差但可能失稳；D阻尼了I引入的振荡。

这套系统在战列舰**新墨西哥号**上进行了测试。结果惊人：

| 控制模式 | 偏航误差 |
|---------|---------|
| 仅 PI | ±2° |
| 完整 PID | **±1/6°** |

PID控制器胜过了熟练的人类舵手，优势超过一个数量级。然而，美国海军，以一种创新史上反复出现的讽刺，当时并未采用这项技术。来自人员的制度性抵制——他们看到自动化是对自身岗位的威胁——阻止了米诺尔斯基系统的规模化部署。

技术已就绪。数学已成立。结果已验证。但制度没有准备好。这不是最后一次。

### 与此同时，在贝尔实验室 —— 1927–1945

当航海界在发明PID时，另一个圈子在攻克一个不同的反馈问题：长途电话。

问题是放大器。要把一通电话从纽约传到旧金山，沿途需要几十个中继放大器，每一级都要增强信号。但真空管放大器是非线性的——增益随温度、老化程度和信号电平变化。级联足够多级，失真会使语音无法辨认。

1927年，一个名叫**哈罗德·布莱克**的贝尔实验室工程师，在乘拉克万纳渡轮横渡哈德逊河时，有了一个顿悟。他在一张《纽约时报》上写下了负反馈的基本方程：将输出的一部分反相送回输入，闭环增益几乎完全由反馈网络决定，而不是放大器本身。放大器的非线性被抑制了。

这个想法如此反直觉——刻意降低增益来提高保真度——美国专利局花了九年才授予布莱克专利。但它成功了。负反馈使长途电话成为可能，然后是无线电，然后是电视。它也创造了一个新问题：反馈放大器会振荡。

**哈利·奈奎斯特**，一位瑞典出生的贝尔实验室数学家，在1932年解决了这个问题。他发展了一种图形化的稳定性判据：在复平面上画出开环频率响应，数对−1点的环绕圈数。不环绕，不振荡。奈奎斯特判据是普适的——它对含时滞的系统、非最小相位系统、任何由频率响应描述的系统都有效。你不需要找到闭环极点。你只要看图就行。

**亨德里克·波特**在1940年代拓展了奈奎斯特的工作。他引入了波特图——如今无处不在的增益(dB)和相位(°)对频率的图表——以及**增益裕度**和**相位裕度**的概念：简单的数字，告诉你离失稳还有多远。波特的方法如此直观，没有大学学历的技术员也能理解。这种对反馈设计的民主化，与数学本身同等重要。波特1945年的著作*《网络分析与反馈放大器设计》*，成为经典控制的"圣经"。

贝尔实验室的三巨头——布莱克、奈奎斯特、波特——给了世界控制的频域方法：将对象转化为传递函数，画出频率响应，设计补偿器来塑形这个响应。这就是今天每个电气工程大三学生还在学的东西。它是系统化的，图形化的，实用的。

但在优雅的理论与工厂车间之间，仍有鸿沟。这道鸿沟，被罗切斯特的两位工程师填平了。

### 齐格勒与尼科尔斯 —— 民主革命 —— 1942

**约翰·齐格勒**和**纳撒尼尔·尼科尔斯**在纽约罗切斯特的泰勒仪器公司工作，这家公司自1851年起就在制造精密温度计和气压计。到1940年代，泰勒在制造气动过程控制器——利用压缩空气，通过波纹管、挡板-喷嘴和弹簧来实现P、I、D动作。它们正在全美国的炼油厂、化工厂和发电站安装。

齐格勒和尼科尔斯面临的问题是务实的：每个回路都需要专家来调。而专家不够。工业扩张的速度超过了知识基础的积累。

他们1942年的论文《自动控制器的最优整定》是一部务实的工程杰作。他们提出了两种整定方法，都不需要秒表和记录仪之外的任何东西：

1. **开环法：** 在控制器输出端引入一个阶跃变化，测量对象的响应曲线（纯滞后、时间常数、增益），然后从表中读取PID参数。

2. **闭环法：** 缓慢增大比例增益，直到回路以恒定幅度振荡。记下"极限增益"和"极限周期"。从第二张表中读取P、I、D参数。

就这样。没有传递函数。没有微分方程。没有频率响应。仅仅：碰一下对象，量一下反应，查表读数。一个只经过一个下午培训的技术员，就能调出一个博士需要一周才能从理论设计出来的控制器。

这就是PID的杀手锏。不是最优性。不是数学优雅。是**可及性。** 齐格勒-尼科尔斯整定法则民主化了控制，正如波特图民主化了放大器设计。它们对大多数工业回路——温度、压力、流量、液位——足够好。而"足够好"在规模化时，是一种自然力量。

到了1943年，泰勒仪器已成为橡树岭原子弹项目——分离铀-235的气体扩散过程——过程控制仪表的总承包商。PID控制器运行着美国的核武器计划。它们运行着为盟军战争机器提供燃料的炼油厂。它们运行着日本切断天然橡胶供应后生产合成橡胶的化工厂。

PID，征服了工业。

### 简单性的代价

但局限从一开始就在那里，刻在架构里：

1. **单输入单输出。** PID天生无法协调多个执行器。你可以为位置调参，也可以为速度调参，但你不能把*两者*都表述为显式的设计目标。在MIMO系统中，你一个回路一个回路地调，祈祷它们不要打架。经常事与愿违。

2. **响应式，非预测式。** 微分项给了你稍微往前看的能力——它响应斜率，而不仅仅是当前值。但PID没有关于对象未来的内部模型。它不能向前仿真，规划一组动作序列。它只能对*正在发生*的事情作出反应。

3. **约束是事后补丁。** 如果你的电机放大器在±12V饱和，而PID控制器要了30V，积分器会在饱和期间不断累加误差——即"积分器Windup"。当执行器最终退出饱和时，累积的积分项猛击输出，造成灾难性超调。修复——抗积分饱和钳位、条件积分——管用。但你需要它这个事实本身，就是核心算法对执行器没有概念的承认。

PID是对这个问题的回答：*什么样的误差修正感觉对？* 对于单回路、约束宽松、行为良好的系统，这就是正确答案。它至今仍然控制着90%以上的工业反馈回路。

但到1950年代，一个完全不同的问题，正要以前所未有的残酷清晰度，暴露PID的极限。而那个问题，在200英里高空，以每小时18,000英里的速度飞行，正在发出哔哔声。

## 第三篇 — 第二幕：状态空间与LQR（1957–1969）

### 太空竞赛重写控制理论

**画面：** 1957年10月4日：斯普特尼克1号——一个抛光金属球，带四根鞭状天线——在近地轨道哔哔作响。世界各地的报纸头条。美国先锋号火箭在发射台上爆炸。冯·布劳恩在黑板前。然后：鲁道夫·卡尔曼，年轻，专注，站在布满矩阵方程的黑板前。Riccati方程。状态空间框图：*ẋ = Ax + Bu*。阿波罗登月舱向静海下降，反作用控制系统喷口射出精确、协同的脉冲。

---

**旁白：**

### 改变了一切的震撼

1957年10月4日，星期五，苏联发射了斯普特尼克1号——一个184磅重的铝球，从近地轨道广播着无线电哔哔声。技术上，它几乎什么都不做。政治上，它做了所有事。斯普特尼克意味着苏联的R-7火箭可以把载荷送到地球上的任何一点。同样的火箭可以送核弹头。导弹差距是真实的。太空竞赛打响了。

美国的反应是即刻的，且预算管够。1958年，国会创建了NASA和国防高级研究计划局。联邦对科学和工程教育的资助爆炸式增长——《国防教育法》投入数十亿来培养数学家、物理学家和工程师。到1961年，肯尼迪总统已承诺：十年内将人送上月球再安全返回。

而登月这件事，你没法用PID做。

### 为什么火箭颠覆了PID

火箭是一个与船舶或炼油厂根本不同的控制问题。

首先，它是**MIMO**——多输入多输出——且通道间是耦合的。火箭有俯仰、偏航和横滚，由多台发动机或单台发动机的万向摆动来控制。当你点燃一个喷口修正俯仰时，也会引入偏航力矩，因为喷口并非完美对中，还因为箭体在承受载荷时会弯曲。你不能独立地调俯仰回路而不管偏航回路。交叉耦合意味着回路2会使回路1失稳。而且你不能串行调参——这个问题在本质上是多变量的。

其次，目标不是"减少超调"。而是：*给定有限的推进剂质量和目标轨迹，找到最小化积分平方跟踪误差的控制历史。* 这是一个**优化问题**，不是调参问题。它需要代价函数、系统模型和数学优化程序。根本不存在一张齐格勒-尼科尔斯表格能告诉你怎么登月。

第三，对象是**非线性和时变的**。火箭的质量随推进剂消耗而减小。它的动态随通过不同大气层而变化。它的执行器会饱和——喷口只能全推力开启或关闭。线性、时不变、SISO的设计方法根本不适用。

1957年现有的控制理论——波特图、奈奎斯特图、齐格勒-尼科尔斯表格——对这个问题毫无用处。一种全新的语言是必需的。

### 贝尔曼与最优性原理 —— 1957

数学工具以惊人的速度到来，当国家存亡攸关时往往如此。

**理查德·贝尔曼**是兰德公司的数学家，这是圣莫尼卡的空军智库。他的任务：找出计算洲际弹道导弹最优轨迹的方法。蛮力法——尝试每一种可能的控制序列，选最好的——遭遇到维度灾难：可能性的数量随时间步长的增加而爆炸。对一个100步、10个变量的问题，你得算到宇宙热寂。

贝尔曼的洞见是递归的：一条最优轨迹具有这样的性质——无论初始状态和决策是什么，后续决策必须对应由第一个决策产生的状态下的最优策略。这就是**最优性原理**。它将一个庞大的单次优化简化为一系列可管理的小优化。从终端状态逆向推算，你可以在状态空间的每一点上计算出最优策略。

贝尔曼在1957年出版了*《动态规划》*。他后来说，选择"动态规划"这个名字部分是因为"规划"听起来无害——时任国防部长查尔斯·威尔逊以敌视数学研究著称，认为那是分散硬件精力的东西。"动态规划"听起来像是计算机能做的事，而不是数学家需要拿钱思考的事。名字留下了。方法留得更牢。今天每一个看着强化学习收敛到游戏策略的学生，都在看贝尔曼的原理在70年后依然运行。

### 庞特里亚金与极大值原理 —— 1958

与此同时，在莫斯科，盲人数学家**列夫·庞特里亚金**正从一个不同角度攻克同一问题。

庞特里亚金的人生故事几乎难以置信。14岁时因煤油炉爆炸双目失明。他的母亲塔季扬娜为了能给他朗读课本，自学了数学。她会描述页面上的符号——"一个字母上的帽子"，"一个带下标的弯弯的e"——而他在脑海中构建数学。他21岁拿到博士学位，成为苏联顶尖的拓扑学家之一。

1950年代，庞特里亚金组建了一支数学家团队——博尔强斯基、加姆克列利泽、米先科——为苏联导弹计划解决最优控制问题。他们的结果，于1958年爱丁堡国际数学家大会上展示，就是**庞特里亚金极大值原理**。

极大值原理将经典变分法扩展到能够处理控制约束——你不能把喷口开到110%，也不能施加负的燃油流量。它引入了一个"哈密顿"函数，并证明最优控制必须使得这个哈密顿量在每一瞬间*极大化*。对于有界输入的线性系统，结果通常是**砰-砰（bang-bang）控制**：最优策略是往一个方向施加最大控制，然后切换到相反方向的最大控制，切换时刻精确确定。开-关-开-关。没有平滑调制。没有渐缓减力。就是全推，然后全反。

贝尔曼的动态规划给出最优性的*充分*条件。庞特里亚金的极大值原理给出*必要*条件。二者合在一起，构成了最优控制的完整理论。到1960年，只要你有模型和代价函数，数学工具已能求解任何最优控制问题。

但还缺一块拼图：一种自然的、系统化的、计算上可行的语言来表达这个问题。这种语言，由20世纪最有影响力的控制理论家提供。

### 鲁道夫·卡尔曼与现代控制的诞生 —— 1960

**鲁道夫·艾米尔·卡尔曼**1930年生于布达佩斯，父亲是电气工程师。1943年，为逃离二战，全家离开匈牙利，13岁的鲁道夫在美国定居。他在MIT获得电气工程学士和硕士学位，1957年在哥伦比亚大学获博士学位。他的导师是采样数据控制系统的先驱约翰·拉加齐尼。

1958年，卡尔曼加入巴尔的摩的高级研究所（RIAS），这是一个由数学家所罗门·莱夫谢茨领导的小而杰出的研究实验室。莱夫谢茨聚集了一群数学倾向的工程师和工程倾向的数学家，给了他们一条指示：解决那些困难的问题。

卡尔曼在1958到1964年间的产出是惊人的。大约六年里，他：

- 发明了卡尔曼滤波器——递归状态估计器，将引导每一次阿波罗任务，如今住在每一个GPS接收器、每一部智能手机、每一辆自动驾驶汽车的传感器融合系统里。
- 引入了**能控性**和**能观性**的形式化概念——"我能把这个系统驱动到任意状态吗？"和"我能从测量中推断出全部状态吗？"——附以优雅的秩条件测试。
- 通过对偶性原理统一了滤波和控制——最优估计的数学结构与最优控制是对偶的。滤波器的Riccati方程和LQR的Riccati方程是孪生的。这是一个深刻而统一的洞察。
- 并且，在一篇1960年发表在《墨西哥数学学会通报》上的题为*《最优控制理论论稿》*的论文中，他公式化了**线性二次型调节器（LQR）**。

LQR的问题是：给定线性系统*ẋ = Ax + Bu*，找到最小化二次代价的控制*u(t)*：

```
J = ∫₀^∞ (xᵀQx + uᵀRu) dt
```

其中Q（半正定）惩罚状态偏离零的程度，R（正定）惩罚控制能耗。解是线性状态反馈：

```
u = −Kx，其中 K = R⁻¹BᵀP
```

而P是**代数Riccati方程**的解：

```
AᵀP + PA − PBR⁻¹BᵀP + Q = 0
```

这就是CARE——连续时间代数Riccati方程。求解它，你就得到了最优增益矩阵K。不是猜测。不是启发式。对所指定的Q和R**可以证明是最优的**，并带有保证的稳定裕度：每个通道至少60°相位裕度和无穷大幅值裕度。

### 为什么这是革命性的

让我退一步解释为什么卡尔曼1960年的论文是工程史上的转折点。

在卡尔曼之前，控制设计的标准方法是频域的：将对象转化为传递函数，画波特图，塑形回路增益。这对SISO系统极为成功——贝尔实验室传统的最佳水平。但它不能以任何自然的方式推广到MIMO。传递函数是标量。MIMO对象是传递函数矩阵。频域工具就是扩展不了。

卡尔曼的状态空间表示——*ẋ = Ax + Bu*，*y = Cx*——是**维度无关的**。无论你有一个状态还是五十个，一个输入还是六个，形式不变。矩阵A、B、C只是变大而已。能控性和能观性的秩测试——rank [B AB A²B...]——无论维度多大都成立。Riccati方程自动产生大小合适的增益矩阵K。

这不是渐进式改进。这是一次范式转移。卡尔曼用状态向量取代了传递函数，用特征值取代了波特图，用李雅普诺夫函数取代了增益裕度。他把控制理论的语言统一在线性代数上——一种计算机天生流利的语言。

而卡尔曼知道计算机才是未来。他的算法——卡尔曼滤波器、LQR——从一开始就是为**数字实现**而设计的。卡尔曼滤波器是递归的：你不需要存储所有过去的测量值，只需要当前的状态估计和误差协方差。在每个时间步，预测，然后更新。它适合微小的内存占用。它实时运行。它是为数字计算机而生的，比微处理器出现早了整整十年。

### 阿波罗的关联

阿波罗计划是将卡尔曼的思想由理论变为任务关键硬件的熔炉。

阿波罗制导计算机（AGC）是1960年代工程的奇迹：2000个16位字的内存，1的补码算术（它真有+0和−0），手工编织的磁芯绳存储器，没有数模接口。每条指令都是手工计时的。一次仿真运行要花半天，结果打印在十英寸厚的纸堆上。登月舱数字自动驾驶仪的代码总预算：2000条指令。

在这台不可能受限的机器里，MIT仪器实验室——后更名为德雷珀实验室——的工程师植入了一个卡尔曼滤波器。这是世界上第一个真实的卡尔曼滤波器应用，且可以说是世界上第一个达到任何复杂度的嵌入式数字控制系统。

卡尔曼滤波器的工作是把来自多个源的含噪测量——惯性测量单元、六分仪读数、地面多普勒雷达——融合成对航天器位置、速度和姿态的单一最佳估计。阿波罗11号发射前九个月，NASA工程师发现他们的地面多普勒跟踪算法不收敛。他们请来了TRW公司的卡尔曼滤波器专家**威廉·利尔**，他为地面跟踪系统写了一个21状态的卡尔曼滤波器。最终检查在发射前一天完成。

登月舱的下降和上升使用了基于庞特里亚金极大值原理的最优控制。MIT工程师**乔治·切里**将自动驾驶仪设计为砰-砰控制器：以满推力点燃反作用控制系统喷口，切换时间由预先计算的最优轨迹决定。控制轴被重新定义为"喷口轴"以简化代码——没有这个关键洞察，2,000字的代码预算根本装不下自动驾驶仪。

这不再是PID。这是状态空间最优控制，运行在史上最受限但执行过任务关键算法的计算机上，引导着人类前往另一个世界的地表。

### LQR的盲区

但LQR有一个盲区。它很大，而且你一旦试图控制任何物理东西，它就一清二楚：**约束。**

LQR表述式*min ∫ (xᵀQx + uᵀRu)* 假设控制u可以是任何实数。但它不能。真实的电机有电压上限——12V放大器不可能输出30V。真实的阀门有行程上限——可以全开或全关，不能开120%。真实的电流有热极限——超了，线圈熔化。

LQR给出无约束的最优增益。如果那个增益要你给12V电机施加30V，LQR的答案就是错的。你可以截断指令——"朴素饱和"——心存侥幸。但正如我们将看到的，那会摧毁最优性，甚至可能使系统失稳。LQR的数学纯粹性，碰到物理就裂了。

一些扩展——LQI（带积分作用的LQR，用于消除稳态误差）、抗积分饱和启发式——在打补丁。但它们终归是补丁。而整个一个行业，正要尖锐地感受到那道裂缝。

## 第四篇 — 第三幕：MPC与QP-MPC（1970s–2000s）

### 约束打破最优性，计算机来救场

**画面：** 夜晚的炼油厂——绵延数英里的管道，精馏塔从下方被照亮，水汽升腾。内部：布满CRT显示器的控制室和寥寥几个操作员。叠印：一张长预测时域的图表，约束边界画为红色水平线。QP公式出现：*min ½UᵀHU + fᵀU*，受约束 *u_min ≤ u_k ≤ u_max*。一枚现代微控制器，比指甲还小。然后：SpaceX猎鹰9号一级在火柱上下降，栅格翼颤动，不违反任何物理极限，精准着陆在一艘无人船上。

---

**旁白：**

### 炼油厂问题

当航空航天界忙着搞LQR时，过程工业——炼油、化工、造纸——有一个1960年代的优雅理论根本无法形式化的问题。

一座炼油厂是一个连续过程。它全年无休，每天24小时运行。它极其复杂——数百个相互连接的单元，数千个控制回路，各部分之间强相互作用。动态是慢的——时间常数以分钟到小时计——这意味着你有时间思考，但也意味着错误在你能纠正之前就会传播。而关键是：**一座炼油厂在紧贴着物理极限运行时最赚钱。**

想想看。一座精馏塔根据沸点将原油分离为不同馏分——石脑油、煤油、柴油。温度越高，分离越好。压力越大，处理量越高。经济最优点是冶金能承受的最高温度和最高压力，管道能处理的最大流量，加热炉能提供的最大能量。经济最优工况几乎总是落在某条约束边界上。事实上，一个过程工厂中通常30%到50%的约束是*活跃的*——工厂就在边界上运行。

如果你的控制器不能显式地处理约束，你就必须回退。你必须远离极限运行——留出"回退裕度"——以确保任何扰动都不会把你推出安全边界。而每一度回退都是利润损失。在一座大型炼油厂，处理量或产率提高1%，每年就值数百万美元。

1960年代的学术控制理论——LQR、LQG、H∞——都是为无约束系统表述的。其工具无法把"u ≤ 12"表达为设计的一部分。工厂操作员心知肚明。他们继续用PID，保守调参，把钱留在桌上。理论与需求之间的鸿沟，以数十亿美元计。

### 工业界反击 —— 理查莱与MPHC（1973–1978）

突破来自工业界，不是学术界。

**雅克·理查莱**是一位法国工程师，在加州大学伯克利分校师从洛特菲·扎德（后来以模糊逻辑闻名），1968年创立了一家名为ADERSA的公司。扎德给了理查莱系统化思维的根基。但理查莱的问题是务实的：如何控制一座精馏塔，在尊重每一个阀门、加热器和压力限制的前提下最大化处理量？

他的方法与当时的学术控制理论截然不同。他不是计算一组固定的反馈增益，而是提出在**每个时间步求解一个优化问题**。在每个采样时刻：

1. 用对象的动态模型预测其未来一段有限时域内的轨迹。
2. 找到最小化预测跟踪误差的控制序列，同时满足所有约束。
3. 只施加序列的第*一个*控制动作。
4. 等待一个采样周期，重新测量状态，重复。

这就是**滚动时域控制**。时域随时间推移而滚动——你总是前看N步，总是在规划，总是在优化，总是只在下一个即时动作之前重新评估。

理查莱的软件叫**IDCOM**（辨识-指令）。模型是有限脉冲响应滤波器——容易从对象阶跃测试数据中获得。优化是二次规划：最小化跟踪误差和控制动作的加权平方和。理查莱称之为**模型预测启发式控制**，"启发式"这个词意味深长。他不在做最优性声明。他不在证明稳定性定理。他在用可用的工具解决一个实际问题，而它管用了。

第一个应用在1973年，是一座二元精馏塔。结果好到过程工业开始关注。理查莱1978年发表在*Automatica*上的论文——*《模型预测启发式控制：在工业过程中的应用》*——历经三年才通过同行评审。审稿人坚持要在标题中加入"启发式"一词。他们对缺乏稳定性证明的方法感到不安。但工业用户不关心证明。他们关心利润。

### 美国平行线 —— 卡特勒、拉梅克与DMC（1979–1980）

独立且几乎同步地，相同的想法出现在休斯顿的壳牌石油。

**查尔斯·卡特勒**从1969年的博士论文提案起就一直在思考基于预测的控制。他的洞见，和理查莱一样，是你可以用一个显式的对象模型来向前仿真并优化控制序列。卡特勒和他的同事**布赖恩·拉梅克**开发了**动态矩阵控制（DMC）**，使用阶跃响应模型——比脉冲响应模型更容易从对象数据获取。你只要碰一下过程，记录输出轨迹，那*就*是你的模型。不需要微分方程。不需要系统辨识。只需一次碰触实验和一条记录曲线。

DMC于1979年4月在休斯顿的一次AIChE会议上发布，并于1980年旧金山联合自动控制会议上发表。壳牌内部部署了它。当结果为人所知——更高的处理量，更严格的质量控制，更少的约束违反——行业其余部分蜂拥跟进。

### 为什么是现在？三个前提条件

为什么MPC出现在1970年代而不是1960年代或1950年代？因为三个前提条件同时成熟了：

**1. 计算机够快了。** 在线求解带约束的二次规划——在每个采样时刻——需要实时优化。一个10步预测时域加电压约束，也就是10个变量的QP。到1970年代后期，小型机（比如DEC PDP-11）可以在慢速化工过程（秒到分钟级）的采样周期内求解这样的QP。到1990年代，微处理器可以处理毫秒动力学的机电系统MPC。到2010年代，一枚2美元的微控制器就能在kHz速率下跑直流电机伺服的MPC。摩尔定律是整个MPC革命的无声赋能者。

**2. 优化算法成熟了。** MPC核心的QP是一个凸优化问题。但在实时嵌入式背景下快速、可靠地求解它需要新的算法。早期实现使用有效集法。后来出现了内点法（卡马卡，1984，以及随后的革命）、快速梯度投影（涅斯捷罗夫，1983），以及像qpOASES和OSQP这样的专用求解器，可以在微秒内求解小规模QP。大卫·梅恩关于MPC稳定性的工作——证明添加终端代价和终端约束可以保证闭环稳定性——将MPC从"它通常管用"转变为"它可以被证明是稳定的"。他在帝国理工的团队产出了使MPC成为一个合法学科和工业实践的理论框架。

**3. 有利可图。** 这可能是最重要的原因。壳牌、埃克森、杜邦等过程公司资助了MPC的开发，因为它直接提高了利润空间。一座十亿美元炼油厂的处理量提高1%，每年就是1000万美元。MPC的投资回报率是可测量的、巨大的、立竿见影的。学术界对MPC的兴趣跟随工业成功，而不是反过来。这是现代工程中罕见的案例：工业界领先，学术界追赶上来。

### MPC比LQR多给了你什么

MPC相比LQR的优势直接与约束的故事相关：

1. **硬约束处理。** 你指定*u_min*和*u_max*（也可以指定*x_min*和*x_max*），优化器保证每一个控制动作都遵循这些边界。不是大约。不是"大多数时候"。数学上，可证明地，约束满足是被保证的（模模型误差）。当最优无约束解会超限时，控制器找到**约束最优**——在不违反物理规律的前提下你能做到的最好——而不是截断、摧毁最优性。

2. **预览和前馈是内置的。** 因为MPC在预测时域内向前仿真模型，它能看到参考变化即将到来，并在误差实际出现*之前*开始动作。这是预判性控制，内建在公式里，不是外加的。

3. **平滑的区间转换。** 当约束不活跃时，QP-MPC精确复现LQR的解——它自动恢复无约束最优。当某个约束变得活跃时，控制器切换到贴边界行驶的轨迹。当约束松弛时，它又平滑地切换回来——自动，没有模式切换，没有增益调度。这就是约束优化的优雅之处：只有一个问题，一个求解器，一个控制律，约束只在绑定时才出现。

### "把LQR饱和一下就行了" —— 最常见的误解

让我来谈谈每个人第一次接触这个想法时都会掉进去的陷阱。

你有LQR。它给了最优增益。你的放大器在±12V饱和。显然的修复：

```
u = clamp(−Kx, −12, 12)
```

一行代码。搞定。这叫**朴素饱和**，而且感觉上是对的。毕竟，当最优控制"可用"时你就在用它，当它不可用时，你在做硬件能做到的最好——对吗？

**不对。** 而这是约束控制中最重要的一个思想。

朴素饱和不是约束最优。它离约束最优甚至都不近，一般情况如此。这里有两个层次的原因：

**层次一——控制器不知道它已经饱和了。** LQR是在假设无限控制权限的前提下计算其增益矩阵K的。整个K是为一个30V存在的世界设计的。当你在事后饱和，控制器继续按仿佛电机收到了30V来规划，而电机实际收到了12V。内部状态估计从物理现实中散开。控制器认为"我们落后了——再加把劲"，又指令30V。它永久地困惑着，永久地指令着它永远也得不到的电压。这会产生振荡、超调，有时失稳——不是因为12V控制不了电机，而是因为*控制器是为一个30V存在的世界设计的。*

**层次二——约束最优有完全不同的形状。** 当你把约束烘焙到优化里，求解器知道它只有±12V。它不是把无约束解截断——它找到一种*结构上完全不同的控制序列*，在最小化跟踪代价的同时整个时域内保持在约束限内。这通常意味着：
- 比无约束解**更早**开始减速，因为有限的电压无法那么猛烈地刹车。
- 在早期施加**更少的电压**，以免超出无法快速纠正的目标。
- 在某些步骤**完全不饱和**，即使朴素截断会撞上边界——因为优化器知道，现在用11.9V，好过打满12V、超调、然后再用−12V去纠正。

关键的区分：朴素饱和说"你使劲干，我来收拾烂摊子。"约束优化说"给定这些墙，找到那条尽可能少碰墙的最佳路径。"二者只在约束从未绑定的平凡情况下产生相同结果。

### 从过程工厂到火箭着陆

MPC历史的弧线，就是计算本身的弧线。

1980年代，MPC是为慢速化工过程的——采样时间以分钟计，QP在小型机上求解，部署在愿意为硬件掏钱的炼油厂。

1990年代，更快的求解器和更快的处理器将MPC带到了机械系统——伺服电机、机床、机器人——亚毫秒采样时间。

2000年代，MPC进入汽车系统——发动机控制、牵引力控制、自动驾驶——其中的约束关乎排放、燃油经济性和安全。

2010年代，MPC成为无人机和航空航天的标配——在杂乱环境中导航的四旋翼，在无人船上垂直着陆的火箭。当你看SpaceX猎鹰9号一级从高超音速下降，栅格翼颤动，发动机摆动，触及一块网球场大小的平台——你正在看着一个约束优化问题被在线求解，以实时速率运行，约束包括推力幅值、推力变化率、万向角度和推进剂晃动动力学。那就是QP-MPC。

在每一波浪潮中，核心理念从未改变：用模型预测，受限于约束进行优化，施加第一拍，重复。改变的是你能做多快，因此你能把它应用到什么样的对象上。计算是瓶颈。计算是赋能者。计算*就是*MPC的故事。

**旁白：**

所以为什么花了两个半世纪才搞清楚怎么控制一个电机？

其实并没有。电机从来不是难点。难点在于**知道该问什么问题。**

### 每一代人问了什么

**19世纪的工程师**——瓦特、磨坊主、早期的调节器设计者——问的是：*我怎么才能让这台机器在没有人操作的情况下恒速运转？* 他们的答案是机械反馈：离心调速器。这是一个关于**自动化**的问题——用机构取代人的注意力。

**麦克斯韦**问的是：*为什么反馈有时会振荡？* 他的答案是微分方程和根的位置。他是第一个认识到反馈是**数学**现象而非仅仅是机械现象的人。

**米诺尔斯基**问的是：*一个熟练的人类操作员实际上做了什么，我能把它形式化吗？* 他的答案是三项控制器。P为现在的误差。I为累积的过去。D为预期中的未来。这是一个关于**提炼人类专业知识**成算法的问题。

**齐格勒和尼科尔斯**问的是：*我们怎么才能让一个拿秒表的技术员也能用？* 他们的答案是经验整定表格。这是一个关于**民主化**的问题——让控制设计成为人人可用的工具，而非数学家的专属。

**奈奎斯特和波特**问的是：*我们怎么才能仅用频率响应数据来保证稳定性？* 他们的答案是图形判据——奈奎斯特图、波特图、增益和相位裕度。这是一个关于**鲁棒性**的问题——当你没有一个完美的模型时，如何设计控制器。

**卡尔曼**问的是：*反馈系统的自然数学语言是什么，"最好"在这个语言里意味着什么？* 他的答案——状态空间表示和LQR——是关于**最优性**和**普适性**的。一个框架，任意数量的状态，任意数量的输入，对给定的代价函数可证明最优。这是控制理论作为应用数学的一个分支。

**理查莱、卡特勒和拉梅克**问的是：*给定一个模型，给定约束，未来N步内我能做的最好动作序列是什么？* 他们的答案——滚动时域QP——是关于**尊重物理**的。不是某种理想化无约束意义上的最优，而是*给定你实际拥有的墙*的最优。

### 那个更深层的模式

看这一进程，你会看到一个更深层的模式：每一代人解的是他们被*付钱去解*的问题，用他们*手里有*的工具，在他们*理解*的约束之内。

瓦特被付钱去让蒸汽机实用。他手里有黄铜、钢铁和发条。约束是人类操作员又慢又贵。他的解法——机械反馈——在那个时代是完美的。

米诺尔斯基和斯佩里被付钱去让船和飞机自己航行。他们手里有陀螺仪、伺服电机，以及——关键——微分方程的数学。他们的解法——PID——是用可用的感知和驱动能造出来的最好的。

卡尔曼被（间接地，通过冷战国防资助）付钱去让火箭、导弹和航天器到达目标。他手里有矩阵代数、数字计算机，以及太空竞赛的紧迫驱动力。他的解法——LQR——利用了这每一个优势。

理查莱和卡特勒被石油公司付钱去从炼油厂中榨出利润。他们手里有小型机、工厂数据，和在约束边界上运行的经济驱动力。他们的解法——MPC——回答了他们的雇主实际在问的问题：*我们能多接近极限而不打破任何东西？*

### 哪个控制器"最好"？

控制工程师的回答：看情况。

**PID**是你的过程简单、单回路、行为良好、约束宽松时的正确答案。它实现简单，容易理解，并且效果好到90%的工业回路仍在使用它。如果你在用电加热器控制一个化学反应器的温度，几乎用不着怀疑，PID就是对的工具。

**LQR**是你的系统有好的线性模型、是MIMO且存在显著耦合、约束不紧时的正确答案。它利用耦合而不是与之对抗，对你所指定的代价函数是全局最优的，且自带保证的稳定裕度。如果你在设计一颗卫星的姿态控制器，LQR是自然而然的选项。

**QP-MPC**是你的系统有硬物理限制——电压、电流、扭矩、温度——且你不能违反它们时的正确答案。它显式地尊重那些限制，在最优性允许的范围内尽可能接近它们运行，并在约束和非约束区间之间平滑过渡。如果你在控制一台在±12V饱和的电机，或者一架电池无法提供更多功率的无人机，或者一枚只有恰好够用的推进剂来完成着陆的火箭——QP-MPC是正确答案。

而关键在于：如果你的约束宽松且系统是线性的，QP-MPC*就是*LQR。QP求解器在所有边界都松弛时恢复无约束最优。拥有不绑定的约束不需要额外代价——优化从容处理。这就是为什么MPC越来越多地成为哪怕约束极少活跃的应用场景的默认选项：有能力处理约束而用不上，总比需要时没有要好。

### 什么变了，什么没变

今天你桌上的那台电机，本质上和1821年迈克尔·法拉第演示的电磁机器是一样的——磁场中的线圈，换向器，一根轴。物理没有变。牛顿定律依然适用。麦克斯韦方程依然支配着电磁学。

变的是我们带给电机的一切。

我们现在有能以弧秒级测量位置、以RPM的几分之一测量速度、以毫安测量电流的传感器——都在千赫兹速率下，都以分币计价。我们有能解Riccati方程、运行卡尔曼滤波器、求解二次规划的微控制器——都在实时运行，都在一块比电机本身还便宜的芯片上。我们有一套麦克斯韦只能梦想的稳定性和最优性数学，由两个世纪里数千个小洞察和少量革命性洞察积累而成。

但最重要的变化是**问题的野心。** 每一代人都抬高了标准：从"能跑起来吗？"到"能跑得好吗？"到"能最优地跑吗？"到"能在尊重每一个我们知道的物理极限的情况下最优地跑吗？"

电机没变。问题在变得更好。

### 给学生的最后一句话

如果你是控制工程的学生，读到这些是因为你想知道为什么你必须把三种方法都学了——PID*还要*学状态空间*还要*学MPC——答案是这个：你在学习两个半世纪积累的智慧。每一种方法刻画了"控制一个东西"的不同面。每一种都是它那个时代的前沿。而每一种今天仍在使用，因为每一种都是某类问题的正确工具。

从PID到LQR到MPC的历史进程，也是教学进程。从PID开始——它会教你反馈，教你速度与稳定性之间的权衡，教你这个事实：积分作用消除稳态误差，但可能失稳。然后进入状态空间和LQR——它会教你最优性，教你代价函数与反馈增益之间的深刻关系，教你支配所有线性控制的数学结构。再进入MPC——它会教你约束，教你真实世界有墙，教你让你在墙内最优导航的计算工具。

而如果你足够幸运，有一天，你将是面对一个这些方法都无法解决的问题的人。一个需要新问题的问题。而你，将为这个故事写下下一篇。

| | PID | LQR / LQI | QP-MPC |
|---|-----|-----------|--------|
| **时代** | 1910s–1940s | 1958–1960 | 1970s–1990s |
| **关键人物** | Sperry、Minorsky、Ziegler、Nichols | Bellman、Pontryagin、Kalman | Richalet、Cutler、Ramaker、Mayne |
| **驱动来源** | 船舶自动驾驶、工业自动化 | 太空竞赛、导弹制导 | 过程工业（石油、化工）、利润空间 |
| **核心洞见** | 三项误差反馈覆盖90%的回路 | 最优控制即二次最小化，带保证裕度 | 滚动时域约束优化——前瞻规划，尊重限制 |
| **数学工具** | 经验整定（齐格勒-尼科尔斯表格） | 代数Riccati方程（CARE） | 在线二次规划（QP） |
| **MIMO？** | 否——本质SISO | 是——维度无关的状态空间 | 是——且在所有通道处理约束 |
| **约束处理** | 抗积分饱和补丁（附加逻辑） | 无——饱和摧毁最优性 | 硬约束内建于优化中 |
| **计算量** | 基本为零（模拟或简单数字） | 一次性矩阵求解（算一次K） | 每个采样时刻求解QP |
| **稳定性保证** | 无（经验的） | 保证裕度（≥60° PM，∞ GM） | 通过终端代价/约束可证明（Mayne等人） |
| **最适合** | 简单、行为良好的SISO回路 | 约束宽松的MIMO系统 | 运行在物理极限附近的系统 |
| **仍然主导** | 过程控制（90%+回路） | 航空航天、导航、估计 | 先进过程控制、汽车、机器人、火箭 |
| **对电机的回答** | "把Kp调到看起来差不多就行" | "这是数学最优增益矩阵K" | "这是12V电源下我能给出的最好电压序列" |

## 核心参考文献

### 原始文献

1. **Maxwell, J.C.（1868）。** "论调节器"，《伦敦皇家学会会刊》，16，第270–283页。 —— 反馈的第一篇数学分析。诺伯特·维纳后来称赞为控制论的奠基文件的那篇论文。

2. **Lyapunov, A.M.（1892）。** 《论运动稳定性的一般问题》，哈尔科夫数学学会。 —— 以俄文出版，1907年译为法文，被西方忽视了60年，然后成为控制工程中最重要的稳定性理论。

3. **Routh, E.J.（1877）。** 《论一类给定运动状态的稳定性》，麦克米兰。 —— 那位剑桥数学家对麦克斯韦1868年寻求普适稳定性判据的回应。

4. **Minorsky, N.（1922）。** "自动操舵体的方向稳定性"，《美国海军工程师学会杂志》，34(2)，第280–309页。 —— 三项（PID）控制器的第一篇形式化数学处理，在新墨西哥号上进行了测试。

5. **Nyquist, H.（1932）。** "再生理论"，《贝尔系统技术期刊》，11(1)，第126–147页。 —— 成为经典频域控制设计基础的图形稳定性判据。

6. **Bode, H.W.（1945）。** 《网络分析与反馈放大器设计》，D. Van Nostrand。 —— 引入波特图、增益裕度和相位裕度，民主化了反馈放大器和控制系统设计的著作。

7. **Ziegler, J.G. & Nichols, N.B.（1942）。** "自动控制器的最优整定"，《美国机械工程师学会会刊》，64(8)，第759–765页。 —— 让PID对每个工厂技术员都可及的整定表格。至今仍在每门控制课程中教授。

8. **Black, H.S.（1934）。** "稳定的反馈放大器"，《电气工程》，53(1)，第114–120页。 —— 在拉克万纳渡轮上发明的负反馈放大器，使长途电话成为可能，并开启了控制的频域方法。

### 现代时期

9. **Bellman, R.E.（1957）。** 《动态规划》，普林斯顿大学出版社。 —— 最优性原理与递归优化，在兰德公司为导弹轨迹计算而发展。

10. **Pontryagin, L.S.，Boltyanskii, V.G.，Gamkrelidze, R.V.，& Mishchenko, E.F.（1962）。** 《最优过程的数学理论》，Wiley（英译本）。 —— 一位盲人苏联数学家及其团队为导弹制导发展的极大值原理。

11. **Kalman, R.E.（1960）。** "最优控制理论论稿"，《墨西哥数学学会通报》，5(1)，第102–119页。 —— LQR的诞生。这篇论文以状态空间和优化的语言重新定义了控制理论。

12. **Kalman, R.E.（1960）。** "线性滤波与预测问题的新方法"，《基础工程期刊》，82(1)，第35–45页。 —— 卡尔曼滤波器，同年同一作者发表。与LQR论文一起，创建了LQG框架。

13. **Kalman, R.E.（1963）。** "线性动力系统的数学描述"，《工业与应用数学学会期刊，A辑：控制》，1(2)，第152–192页。 —— 状态空间表示、能控性、能观性。现代控制的词汇表。

14. **Richalet, J.，Rault, A.，Testud, J.L.，& Papon, J.（1978）。** "模型预测启发式控制：在工业过程中的应用"，《Automatica》，14(5)，第413–428页。 —— 启动了MPC的论文。"启发式"一词是在审稿人坚持下添加的——稳定性证明后面才来。

15. **Cutler, C.R. & Ramaker, B.L.（1980）。** "动态矩阵控制——一种计算机控制算法"，《联合自动控制会议论文集》，旧金山。 —— 壳牌的DMC，过程控制史上部署最广的MPC变体。

16. **Mayne, D.Q.，Rawlings, J.B.，Rao, C.V.，& Scokaert, P.O.M.（2000）。** "带约束的模型预测控制：稳定性与最优性"，《Automatica》，36(6)，第789–814页。 —— 统一了MPC稳定性理论的里程碑综述。近万次引用且仍在增长。

### 延伸阅读

17. **Mindell, D.A.（2008）。** 《数字阿波罗：太空飞行中的人与机器》，MIT出版社。 —— 关于阿波罗制导计算机与人机接口的权威历史。

18. **Maciejowski, J.M.（2002）。** 《带约束的预测控制》，Prentice Hall。 —— MPC理论与实现的标准教材。

19. **Boyd, S. & Vandenberghe, L.（2004）。** 《凸优化》，剑桥大学出版社。 —— 支撑现代MPC的QP求解器的优化理论基础。中文版由清华大学出版社出版。

20. **Qin, S.J. & Badgwell, T.A.（2003）。** "工业模型预测控制技术综述"，《控制工程实践》，11(7)，第733–764页。 —— 从研究概念到部署工业技术的MPC全景演进。

21. **Bennett, S.（1993）。** 《控制工程史，1800–1930》，IET。 —— 现代控制前史的权威著作。理解麦克斯韦与米诺尔斯基之间那段空白的关键读物。

22. **Bennett, S.（1993）。** 《控制工程史，1930–1955》，IET。 —— 覆盖频域革命、二战伺服机构和过程控制的崛起。

23. **刘豹，唐万生（2011/第3版）。** 《现代控制理论》，机械工业出版社。 —— 国内本科自动化专业经典教材，含状态空间与LQR的详细推导。
